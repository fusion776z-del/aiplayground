<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sky Island Adventure</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:grid;
      place-items:center;
      background:linear-gradient(#9eeaff,#55b9ff);
      font-family:system-ui;
      color:white;
      overflow:hidden;
      touch-action:none;
    }

    .frame{
      padding:14px;
      border-radius:24px;
      background:rgba(255,255,255,.18);
    }

    canvas{
      width:min(92vw,calc(92vh * 9 / 16));
      height:auto;
      aspect-ratio:9/16;
      max-width:520px;
      border-radius:18px;
      background:#8fe8ff;
      display:block;
    }

    .hint{
      text-align:center;
      font-size:12px;
      margin-top:10px;
    }

    .pill{
      padding:5px 10px;
      border-radius:999px;
      background:rgba(8,25,45,.35);
    }

    #joystick{
      position:fixed;
      left:-14px;
      bottom:-14px;
      width:136px;
      height:136px;
      border-radius:999px;
      background:rgba(255,255,255,.16);
      opacity:.34;
      touch-action:none;
    }

    .stick{
      position:absolute;
      left:50%;
      top:50%;
      width:52px;
      height:52px;
      border-radius:999px;
      transform:translate(-50%,-50%);
      background:rgba(255,255,255,.72);
    }

    .actions{
      position:fixed;
      right:12px;
      bottom:12px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .tbtn{
      width:74px;
      height:74px;
      border:0;
      border-radius:23px;
      background:rgba(8,25,45,.20);
      color:white;
      display:grid;
      place-items:center;
      font-weight:900;
      opacity:.42;
    }

    @media(pointer:fine){
      #joystick,
      .actions{
        display:none;
      }
    }
  </style>
</head>

<body>
  <div class="frame">
    <canvas id="game" width="360" height="640"></canvas>
    <div class="hint">
      <span class="pill">Sky Island Adventure</span>
    </div>
  </div>

  <div id="joystick">
    <div class="stick" id="stick"></div>
  </div>

  <div class="actions">
    <button class="tbtn" id="actionBtn">ACT</button>
    <button class="tbtn" id="magicBtn">MAGIC</button>
    <button class="tbtn" id="dashBtn">DASH</button>
    <button class="tbtn" id="attackBtn">ATK</button>
  </div>

  <script src="stage1.js"></script>
  <script src="stage2.js"></script>
  <script src="stage3.js"></script>
  <script src="stage4.js"></script>
  <script src="stage5.js"></script>
  <script src="stage6.js"></script>
  <script src="stage7.js"></script>
  <script src="characterRenderer.js"></script>
  <script src="enemyTypes.js"></script>
  <script src="game.js"></script>
</body>
</html>
