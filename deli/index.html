<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>配達ゲーム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>配達ゲーム</h1>

    <div class="card">
      <div class="order-title" id="orderText">注文：---</div>
      <div class="sub" id="orderRule">制限時間：--秒</div>
      <div class="sub" id="selectedMoveText">現在の移動方法：歩く（1回で経過時間 +8秒）</div>

      <div class="shop-grid">
        <button onclick="chooseShop('ramenNear')">近いラーメン屋</button>
        <button onclick="chooseShop('ramenFar')">遠いラーメン屋</button>

        <button onclick="chooseShop('pizzaNear')">近いピザ屋</button>
        <button onclick="chooseShop('pizzaFar')">遠いピザ屋</button>

        <button onclick="chooseShop('cakeNear')">近いケーキ屋</button>
        <button onclick="chooseShop('cakeFar')">遠いケーキ屋</button>

        <button onclick="chooseShop('sushiNear')">近い寿司屋</button>
        <button onclick="chooseShop('sushiFar')">遠い寿司屋</button>
      </div>
    </div>

    <div class="info-box">
      <div id="status">注文を受けてください</div>
      <p id="timer">経過時間：0秒</p>
      <p id="progress">移動距離：0 / 0</p>

      <div class="action-row">
        <button class="move-btn" onclick="move()">▶ 前進</button>
        <button class="deliver-btn" onclick="deliver()">📦 配達する</button>
        <button class="next-btn" id="nextBtn" onclick="newOrder()">次の注文</button>
      </div>
    </div>

    <div class="info-box">
      <h2>スキルショップ</h2>
      <p class="small">所持金を使って移動方法を購入できます。購入後は「使う」で切り替え。</p>
      <div class="skill-grid" id="skillShop"></div>
    </div>

    <div class="info-box">
      <div id="scoreBoard">
        所持金：0円<br>
        累計報酬：0円<br>
        最高所持金：0円<br>
        ランク：C
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
