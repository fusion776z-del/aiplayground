<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>配達ゲーム 3D版 修正版</title>
  <style>
    :root {
      --bg: #111827;
      --panel: rgba(17, 24, 39, 0.9);
      --card: rgba(31, 41, 55, 0.94);
      --line: rgba(255,255,255,0.1);
      --text: #f9fafb;
      --sub: #cbd5e1;
      --accent: #38bdf8;
      --good: #22c55e;
      --violet: #8b5cf6;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #game3d {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
    }

    canvas {
      display: block;
    }

    .hud {
      position: absolute;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: min(420px, calc(100vw - 16px));
      max-height: calc(100vh - 16px);
      overflow: auto;
      padding-right: 2px;
    }

    .hud.left {
      left: 8px;
      top: 8px;
    }

    .hud.right {
      right: 8px;
      top: 8px;
      width: min(360px, calc(100vw - 16px));
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.28);
    }

    .title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
      color: var(--accent);
    }

    .sub {
      color: var(--sub);
      font-size: 13px;
      line-height: 1.5;
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .shop-grid,
    .skill-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 10px;
      font-size: 14px;
      font-weight: 700;
      color: white;
      background: #334155;
      cursor: pointer;
      min-height: 48px;
      touch-action: manipulation;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .shop-btn {
      background: #1f2937;
    }

    .move-btn {
      background: #2563eb;
    }

    .deliver-btn {
      background: #16a34a;
    }

    .next-btn {
      background: #f59e0b;
      display: none;
    }

    .turn-btn {
      background: #475569;
    }

    .buy-btn {
      background: var(--violet);
    }

    .use-btn {
      background: #0f766e;
    }

    .metric {
      font-size: 14px;
      line-height: 1.8;
      color: var(--sub);
    }

    .status {
      min-height: 72px;
      line-height: 1.6;
      font-size: 15px;
    }

    .big {
      font-size: 18px;
      font-weight: 800;
      color: #fde047;
    }

    .shop-name {
      color: #fcd34d;
      font-weight: 800;
    }

    .skill-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
    }

    .skill-title {
      font-weight: 800;
      color: #fde68a;
      margin-bottom: 6px;
      font-size: 15px;
    }

    .skill-desc {
      font-size: 12.5px;
      line-height: 1.6;
      color: var(--sub);
      margin-bottom: 8px;
    }

    .badge {
      display: inline-block;
      margin-left: 6px;
      font-size: 11px;
      border-radius: 999px;
      padding: 3px 7px;
      color: white;
    }

    .owned {
      background: var(--good);
    }

    .active {
      background: #2563eb;
    }

    .controls {
      position: absolute;
      z-index: 12;
      left: 50%;
      bottom: 8px;
      transform: translateX(-50%);
      width: min(640px, calc(100vw - 16px));
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      pointer-events: none;
    }

    .controls .row {
      justify-content: center;
      pointer-events: auto;
    }

    .hint {
      position: absolute;
      z-index: 9;
      bottom: 132px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.72);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--sub);
      backdrop-filter: blur(8px);
    }

    @media (max-width: 900px) {
      .hud.right {
        top: auto;
        bottom: 140px;
        width: min(360px, calc(100vw - 16px));
      }
    }

    @media (max-width: 700px) {
      .hud.left,
      .hud.right {
        width: calc(100vw - 16px);
      }

      .hud.right {
        right: 8px;
        bottom: 140px;
      }

      .shop-grid,
      .skill-grid {
        grid-template-columns: 1fr;
      }

      .hint {
        bottom: 146px;
        width: calc(100vw - 24px);
        text-align: center;
        border-radius: 14px;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="game3d"></div>

    <div class="hud left">
      <div class="panel">
        <div class="title">配達ゲーム 3D版</div>
        <div id="orderText" class="big">注文：---</div>
        <div id="orderRule" class="metric">制限時間：--秒</div>
        <div id="selectedMoveText" class="metric">現在の移動方法：歩く（+8秒）</div>

        <div class="sub">
          店を選んで前進してください。目的地に着いたら「配達する」を押します。
        </div>

        <div class="shop-grid">
          <button class="shop-btn" onclick="chooseShop('ramenNear')">近いラーメン屋</button>
          <button class="shop-btn" onclick="chooseShop('ramenFar')">遠いラーメン屋</button>
          <button class="shop-btn" onclick="chooseShop('pizzaNear')">近いピザ屋</button>
          <button class="shop-btn" onclick="chooseShop('pizzaFar')">遠いピザ屋</button>
          <button class="shop-btn" onclick="chooseShop('cakeNear')">近いケーキ屋</button>
          <button class="shop-btn" onclick="chooseShop('cakeFar')">遠いケーキ屋</button>
          <button class="shop-btn" onclick="chooseShop('sushiNear')">近い寿司屋</button>
          <button class="shop-btn" onclick="chooseShop('sushiFar')">遠い寿司屋</button>
        </div>
      </div>

      <div class="panel">
        <div id="status" class="status">読み込み中...</div>
        <div id="timer" class="metric">経過時間：0秒</div>
        <div id="progress" class="metric">移動距離：0 / 0</div>
        <div id="locationText" class="metric">現在地：出発地点</div>

        <div class="row" style="margin-top:10px;">
          <button class="deliver-btn" onclick="deliver()">📦 配達する</button>
          <button class="next-btn" id="nextBtn" onclick="newOrder()">次の注文</button>
        </div>
      </div>
    </div>

    <div class="hud right">
      <div class="panel">
        <div style="font-weight:800; margin-bottom:8px;">スキルショップ</div>
        <div class="sub">購入した移動方法は「使う」で切り替えできます。</div>
        <div id="skillShop" class="skill-grid"></div>
      </div>

      <div class="panel">
        <div id="scoreBoard" class="metric">
          所持金：0円<br>
          累計報酬：0円<br>
          最高所持金：0円<br>
          ランク：C
        </div>
      </div>
    </div>

    <div class="hint">スマホでは下のボタンで操作できます</div>

    <div class="controls">
      <div class="row">
        <button class="turn-btn" onclick="turnLeft()">⟲ 左を見る</button>
        <button class="move-btn" onclick="move()">▶ 前進</button>
        <button class="turn-btn" onclick="turnRight()">右を見る ⟳</button>
      </div>
      <div class="row">
        <button class="turn-btn" onclick="lookCenter()">視点を正面に戻す</button>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js";

    const shops = {
      ramenNear: {
        name: "近いラーメン屋",
        item: "ramen",
        cost: 1000,
        distanceLabel: "近い",
        travelSteps: 3,
        color: 0xef4444
      },
      ramenFar: {
        name: "遠いラーメン屋",
        item: "ramen",
        cost: 500,
        distanceLabel: "遠い",
        travelSteps: 6,
        color: 0xb91c1c
      },
      pizzaNear: {
        name: "近いピザ屋",
        item: "pizza",
        cost: 1100,
        distanceLabel: "近い",
        travelSteps: 3,
        color: 0xf97316
      },
      pizzaFar: {
        name: "遠いピザ屋",
        item: "pizza",
        cost: 600,
        distanceLabel: "遠い",
        travelSteps: 6,
        color: 0xc2410c
      },
      cakeNear: {
        name: "近いケーキ屋",
        item: "cake",
        cost: 1200,
        distanceLabel: "近い",
        travelSteps: 3,
        color: 0xec4899
      },
      cakeFar: {
        name: "遠いケーキ屋",
        item: "cake",
        cost: 700,
        distanceLabel: "遠い",
        travelSteps: 6,
        color: 0xbe185d
      },
      sushiNear: {
        name: "近い寿司屋",
        item: "sushi",
        cost: 1300,
        distanceLabel: "近い",
        travelSteps: 3,
        color: 0x06b6d4
      },
      sushiFar: {
        name: "遠い寿司屋",
        item: "sushi",
        cost: 800,
        distanceLabel: "遠い",
        travelSteps: 6,
        color: 0x0e7490
      }
    };

    const orders = [
      {
        item: "ramen",
        name: "ラーメン",
        timeLimit: 45,
        fragile: false
      },
      {
        item: "pizza",
        name: "ピザ",
        timeLimit: 55,
        fragile: false
      },
      {
        item: "cake",
        name: "ケーキ",
        timeLimit: 40,
        fragile: true
      },
      {
        item: "sushi",
        name: "寿司",
        timeLimit: 50,
        fragile: false
      }
    ];

    const movementSkills = {
      walk: {
        key: "walk",
        name: "歩く",
        moveTime: 8,
        cost: 0,
        maxUses: Infinity,
        maintenance: 0
      },
      run: {
        key: "run",
        name: "走る",
        moveTime: 7,
        cost: 120,
        maxUses: Infinity,
        maintenance: 0
      },
      bicycle: {
        key: "bicycle",
        name: "自転車",
        moveTime: 6,
        cost: 260,
        maxUses: 6,
        maintenance: 5
      },
      bike: {
        key: "bike",
        name: "バイク",
        moveTime: 5,
        cost: 520,
        maxUses: 4,
        maintenance: 12
      },
      car: {
        key: "car",
        name: "自動車",
        moveTime: 4,
        cost: 900,
        maxUses: 3,
        maintenance: 20
      },
      parkour: {
        key: "parkour",
        name: "パルクール",
        moveTime: 3,
        cost: 1400,
        maxUses: 2,
        maintenance: 0
      }
    };

    let currentOrder = null;
    let selectedShop = null;

    let time = 0;
    let money = 0;
    let totalEarned = 0;
    let bestMoney = Number(localStorage.getItem("delivery3DBestMoney") || 0);
    let progressSteps = 0;
    let orderFinished = false;

    let ownedSkills = loadOwnedSkills();
    let activeMoveSkill = localStorage.getItem("delivery3DActiveMoveSkill") || "walk";
    let skillUsesLeft = {};

    let scene = null;
    let camera = null;
    let renderer = null;
    let clock = null;
    let worldGroup = null;

    let highlightRing = null;
    let deliveryGate = null;
    let shopMeshes = {};

    let currentYaw = 0;
    let targetYaw = 0;

    let isAnimatingStep = false;
    let stepFromZ = 0;
    let stepToZ = 0;
    let stepProgress = 0;

    const STEP_WORLD_LENGTH = 12;
    const START_Z = 18;

    const TARGET_X_BY_ITEM = {
      ramen: -18,
      pizza: -6,
      cake: 6,
      sushi: 18
    };

    window.chooseShop = chooseShop;
    window.move = move;
    window.deliver = deliver;
    window.newOrder = newOrder;
    window.buySkill = buySkill;
    window.setActiveSkill = setActiveSkill;
    window.turnLeft = turnLeft;
    window.turnRight = turnRight;
    window.lookCenter = lookCenter;

    startGame();

    function startGame() {
      try {
        if (!ownedSkills.walk) {
          ownedSkills.walk = true;
        }

        if (!ownedSkills[activeMoveSkill]) {
          activeMoveSkill = "walk";
        }

        resetSkillUses();
        renderSkillShop();
        updateMoveText();
        updateScoreBoard();

        init3D();
        animate();

        window.addEventListener("resize", onResize);

        newOrder();
      } catch (err) {
        console.error(err);

        const status = document.getElementById("status");
        if (status) {
          status.innerHTML =
            "ゲームの起動に失敗しました。<br>" +
            "Live Server / GitHub Pages / localhost で開いてください。";
        }
      }
    }

    function loadOwnedSkills() {
      try {
        const raw = localStorage.getItem("delivery3DOwnedSkills");

        if (!raw) {
          return { walk: true };
        }

        return {
          walk: true,
          ...JSON.parse(raw)
        };
      } catch {
        return { walk: true };
      }
    }

    function saveSkillState() {
      localStorage.setItem("delivery3DOwnedSkills", JSON.stringify(ownedSkills));
      localStorage.setItem("delivery3DActiveMoveSkill", activeMoveSkill);
      localStorage.setItem("delivery3DBestMoney", String(bestMoney));
    }

    function resetSkillUses() {
      skillUsesLeft = {};

      for (const skill of Object.values(movementSkills)) {
        skillUsesLeft[skill.key] = skill.maxUses;
      }
    }

    function usesLabel(skill) {
      if (skill.maxUses === Infinity) {
        return "無制限";
      }

      return `${skillUsesLeft[skill.key]}回 / ${skill.maxUses}回`;
    }

    function init3D() {
      const mount = document.getElementById("game3d");

      if (!mount) {
        throw new Error("game3d が見つかりません");
      }

      const width = Math.max(1, mount.clientWidth);
      const height = Math.max(1, mount.clientHeight);

      scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0x0f172a, 45, 180);

      camera = new THREE.PerspectiveCamera(
        72,
        width / height,
        0.5,
        300
      );
      camera.position.set(0, 1.7, START_Z);
      camera.rotation.order = "YXZ";

      renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: false,
        logarithmicDepthBuffer: true
      });

      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(width, height);
      renderer.setClearColor(0x0f172a, 1);
      renderer.shadowMap.enabled = true;

      mount.innerHTML = "";
      mount.appendChild(renderer.domElement);

      clock = new THREE.Clock();

      const hemi = new THREE.HemisphereLight(0xbfe3ff, 0x223344, 1.2);
      scene.add(hemi);

      const sun = new THREE.DirectionalLight(0xffffff, 1.45);
      sun.position.set(12, 24, 8);
      sun.castShadow = true;
      sun.shadow.camera.near = 1;
      sun.shadow.camera.far = 80;
      sun.shadow.mapSize.width = 1024;
      sun.shadow.mapSize.height = 1024;
      scene.add(sun);

      const sky = new THREE.Mesh(
        new THREE.SphereGeometry(220, 24, 24),
        new THREE.MeshBasicMaterial({
          color: 0x0b1220,
          side: THREE.BackSide
        })
      );
      scene.add(sky);

      worldGroup = new THREE.Group();
      scene.add(worldGroup);

      createGroundAndRoad();
      createScenery();
      createShopMarkers();
      createHighlightRing();
      createDeliveryGate();
    }

    function createGroundAndRoad() {
      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(240, 240),
        new THREE.MeshStandardMaterial({
          color: 0x14532d,
          roughness: 1
        })
      );
      ground.rotation.x = -Math.PI / 2;
      ground.position.set(0, 0, -40);
      ground.receiveShadow = true;
      worldGroup.add(ground);

      const road = new THREE.Mesh(
        new THREE.PlaneGeometry(20, 220),
        new THREE.MeshBasicMaterial({
          color: 0x1f2937,
          polygonOffset: true,
          polygonOffsetFactor: -4,
          polygonOffsetUnits: -4
        })
      );
      road.rotation.x = -Math.PI / 2;
      road.position.set(0, 0.06, -60);
      road.renderOrder = 1;
      worldGroup.add(road);

      for (let i = 0; i < 18; i++) {
        const stripe = new THREE.Mesh(
          new THREE.PlaneGeometry(1.35, 5.4),
          new THREE.MeshBasicMaterial({
            color: 0xe5e7eb,
            polygonOffset: true,
            polygonOffsetFactor: -8,
            polygonOffsetUnits: -8
          })
        );

        stripe.rotation.x = -Math.PI / 2;
        stripe.position.set(0, 0.12, START_Z - 8 - i * 13);
        stripe.renderOrder = 2;
        worldGroup.add(stripe);
      }

      const leftCurb = new THREE.Mesh(
        new THREE.BoxGeometry(0.5, 0.28, 220),
        new THREE.MeshStandardMaterial({
          color: 0x475569,
          roughness: 0.85
        })
      );
      leftCurb.position.set(-10.25, 0.14, -60);
      leftCurb.castShadow = true;
      leftCurb.receiveShadow = true;
      worldGroup.add(leftCurb);

      const rightCurb = leftCurb.clone();
      rightCurb.position.x = 10.25;
      worldGroup.add(rightCurb);
    }

    function createScenery() {
      for (let i = 0; i < 14; i++) {
        const z = START_Z - 10 - i * 16;

        const tree = new THREE.Mesh(
          new THREE.ConeGeometry(2, 5, 8),
          new THREE.MeshStandardMaterial({
            color: 0x15803d,
            roughness: 0.9
          })
        );
        tree.position.set(-18 - (i % 2) * 8, 4, z);
        tree.castShadow = true;
        worldGroup.add(tree);

        const trunk = new THREE.Mesh(
          new THREE.CylinderGeometry(0.45, 0.55, 2.8, 8),
          new THREE.MeshStandardMaterial({
            color: 0x7c2d12,
            roughness: 0.9
          })
        );
        trunk.position.set(tree.position.x, 1.4, z);
        trunk.castShadow = true;
        worldGroup.add(trunk);

        const building = new THREE.Mesh(
          new THREE.BoxGeometry(6, 4 + (i % 3), 6),
          new THREE.MeshStandardMaterial({
            color: i % 2 === 0 ? 0x475569 : 0x3f3f46,
            roughness: 0.9
          })
        );
        building.position.set(18 + (i % 2) * 8, 2 + (i % 3) * 0.5, z - 3);
        building.castShadow = true;
        building.receiveShadow = true;
        worldGroup.add(building);
      }
    }

    function createShopMarkers() {
      const boxGeo = new THREE.BoxGeometry(5, 4.5, 5);

      for (const [key, shop] of Object.entries(shops)) {
        const mat = new THREE.MeshStandardMaterial({
          color: shop.color,
          emissive: 0x000000,
          roughness: 0.75
        });

        const mesh = new THREE.Mesh(boxGeo, mat);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        mesh.visible = false;
        worldGroup.add(mesh);

        shopMeshes[key] = mesh;
      }
    }

    function createHighlightRing() {
      highlightRing = new THREE.Mesh(
        new THREE.TorusGeometry(3.8, 0.18, 12, 40),
        new THREE.MeshBasicMaterial({
          color: 0xf8fafc,
          depthTest: true
        })
      );
      highlightRing.rotation.x = Math.PI / 2;
      highlightRing.position.y = 0.22;
      highlightRing.visible = false;
      highlightRing.renderOrder = 3;
      worldGroup.add(highlightRing);
    }

    function createDeliveryGate() {
      deliveryGate = new THREE.Mesh(
        new THREE.BoxGeometry(8, 7, 1.4),
        new THREE.MeshStandardMaterial({
          color: 0x22c55e,
          emissive: 0x052e16,
          transparent: true,
          opacity: 0.88,
          roughness: 0.7
        })
      );
      deliveryGate.visible = false;
      deliveryGate.castShadow = true;
      worldGroup.add(deliveryGate);
    }

    function onResize() {
      const mount = document.getElementById("game3d");

      if (!camera || !renderer || !mount) {
        return;
      }

      const width = Math.max(1, mount.clientWidth);
      const height = Math.max(1, mount.clientHeight);

      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height);
    }

    function animate() {
      requestAnimationFrame(animate);

      if (!renderer || !scene || !camera || !clock) {
        return;
      }

      const delta = clock.getDelta();

      currentYaw += (targetYaw - currentYaw) * Math.min(1, delta * 7);

      if (isAnimatingStep) {
        stepProgress += delta * 3.5;

        const t = Math.min(stepProgress, 1);
        const eased = 1 - Math.pow(1 - t, 3);

        camera.position.z = THREE.MathUtils.lerp(stepFromZ, stepToZ, eased);
        camera.position.y = 1.7 + Math.sin(t * Math.PI) * 0.08;

        if (t >= 1) {
          isAnimatingStep = false;
          camera.position.z = stepToZ;
          camera.position.y = 1.7;
        }
      }

      if (highlightRing && highlightRing.visible) {
        highlightRing.rotation.z += delta * 1.5;
      }

      camera.position.x = 0;
      camera.rotation.y = currentYaw;
      camera.rotation.x = 0;

      renderer.render(scene, camera);
    }

    function resetWorldForNewOrder() {
      for (const mesh of Object.values(shopMeshes)) {
        mesh.visible = false;
        mesh.material.emissive.setHex(0x000000);
      }

      if (highlightRing) {
        highlightRing.visible = false;
      }

      if (deliveryGate) {
        deliveryGate.visible = false;
      }

      if (camera) {
        camera.position.set(0, 1.7, START_Z);
        currentYaw = 0;
        targetYaw = 0;
        isAnimatingStep = false;
        stepProgress = 0;
      }

      updateLocationText("出発地点");
    }

    function placeSelectedShop(shopKey) {
      for (const mesh of Object.values(shopMeshes)) {
        mesh.visible = false;
        mesh.material.emissive.setHex(0x000000);
      }

      const shop = shops[shopKey];
      const mesh = shopMeshes[shopKey];

      if (!shop || !mesh) {
        return;
      }

      const x = TARGET_X_BY_ITEM[shop.item];
      const z = START_Z - shop.travelSteps * STEP_WORLD_LENGTH;

      mesh.visible = true;
      mesh.position.set(x, 2.3, z);
      mesh.material.color.setHex(shop.color);
      mesh.material.emissive.setHex(0x222222);

      if (highlightRing) {
        highlightRing.visible = true;
        highlightRing.position.set(x, 0.22, z);
      }

      if (deliveryGate) {
        deliveryGate.visible = false;
      }
    }

    function showDeliveryGate() {
      if (!selectedShop || !deliveryGate) {
        return;
      }

      const x = TARGET_X_BY_ITEM[selectedShop.item];
      const z = START_Z - selectedShop.travelSteps * STEP_WORLD_LENGTH - 7;

      deliveryGate.visible = true;
      deliveryGate.position.set(x, 3.5, z);
    }

    function updateLocationText(text) {
      const el = document.getElementById("locationText");

      if (el) {
        el.innerText = `現在地：${text}`;
      }
    }

    function updateTimer() {
      const el = document.getElementById("timer");

      if (el) {
        el.innerText = `経過時間：${time}秒`;
      }
    }

    function updateProgress() {
      const el = document.getElementById("progress");

      if (!el) {
        return;
      }

      if (!selectedShop) {
        el.innerText = "移動距離：0 / 0";
        return;
      }

      el.innerText = `移動距離：${Math.min(progressSteps, selectedShop.travelSteps)} / ${selectedShop.travelSteps}`;
    }

    function updateMoveText() {
      const skill = movementSkills[activeMoveSkill];

      const limit =
        skill.maxUses === Infinity
          ? "回数無制限"
          : `残り${skillUsesLeft[skill.key]}回`;

      const el = document.getElementById("selectedMoveText");

      if (el) {
        el.innerText =
          `現在の移動方法：${skill.name}（1回で経過時間 +${skill.moveTime}秒 / 維持費 ${skill.maintenance}円 / ${limit}）`;
      }
    }

    function updateScoreBoard() {
      let rank = "C";

      if (totalEarned >= 1600) {
        rank = "S";
      } else if (totalEarned >= 1000) {
        rank = "A";
      } else if (totalEarned >= 500) {
        rank = "B";
      }

      const el = document.getElementById("scoreBoard");

      if (el) {
        el.innerHTML =
          `所持金：${money}円<br>` +
          `累計報酬：${totalEarned}円<br>` +
          `最高所持金：${bestMoney}円<br>` +
          `ランク：${rank}`;
      }
    }

    function renderSkillShop() {
      const wrap = document.getElementById("skillShop");

      if (!wrap) {
        return;
      }

      wrap.innerHTML = "";

      for (const skill of Object.values(movementSkills)) {
        const owned = !!ownedSkills[skill.key];
        const active = activeMoveSkill === skill.key;

        const card = document.createElement("div");
        card.className = "skill-card";

        card.innerHTML = `
          <div class="skill-title">
            ${skill.name}
            ${owned ? '<span class="badge owned">購入済み</span>' : ""}
            ${active ? '<span class="badge active">使用中</span>' : ""}
          </div>

          <div class="skill-desc">
            前進1回で経過時間 +${skill.moveTime}秒<br>
            購入価格：${skill.cost}円<br>
            維持費：${skill.maintenance}円 / 回<br>
            残り回数：${usesLabel(skill)}
          </div>

          <div class="row">
            <button class="buy-btn" ${owned ? "disabled" : ""} onclick="buySkill('${skill.key}')">購入</button>
            <button class="use-btn" ${owned ? "" : "disabled"} onclick="setActiveSkill('${skill.key}')">使う</button>
          </div>
        `;

        wrap.appendChild(card);
      }
    }

    function newOrder() {
      currentOrder = orders[Math.floor(Math.random() * orders.length)];

      selectedShop = null;
      time = 0;
      progressSteps = 0;
      orderFinished = false;

      resetSkillUses();
      resetWorldForNewOrder();

      const orderText = document.getElementById("orderText");

      if (orderText) {
        orderText.innerText = `注文：${currentOrder.name}`;
      }

      const orderRule = document.getElementById("orderRule");

      if (orderRule) {
        orderRule.innerText = `制限時間：${currentOrder.timeLimit}秒`;
      }

      const status = document.getElementById("status");

      if (status) {
        status.innerHTML =
          "店を選んでください。<br>" +
          "注文に合う「近い店」か「遠い店」を選ぶと有利です。";
      }

      const nextBtn = document.getElementById("nextBtn");

      if (nextBtn) {
        nextBtn.style.display = "none";
      }

      updateTimer();
      updateProgress();
      updateMoveText();
      updateScoreBoard();
      renderSkillShop();
    }

    function chooseShop(shopKey) {
      if (orderFinished) {
        return;
      }

      selectedShop = shops[shopKey];
      progressSteps = 0;

      if (!selectedShop) {
        return;
      }

      placeSelectedShop(shopKey);
      lookCenter();

      updateProgress();
      updateLocationText(`${selectedShop.name}へ向かう道`);

      const status = document.getElementById("status");

      if (status) {
        status.innerHTML =
          `<span class="shop-name">${selectedShop.name}</span> を選択しました。<br>` +
          "3D空間の先に光る建物が目的地です。前進してください。";
      }
    }

    function move() {
      if (orderFinished) {
        return;
      }

      if (!selectedShop) {
        alert("先に店を選んでください！");
        return;
      }

      if (isAnimatingStep) {
        return;
      }

      const skill = movementSkills[activeMoveSkill];

      if (skillUsesLeft[skill.key] <= 0) {
        const status = document.getElementById("status");

        if (status) {
          status.innerHTML =
            `⚠️ ${skill.name} はこの注文ではもう使えません。<br>` +
            "別の移動方法に切り替えてください。";
        }

        renderSkillShop();
        updateMoveText();
        return;
      }

      if (money < skill.maintenance) {
        const status = document.getElementById("status");

        if (status) {
          status.innerHTML =
            `⚠️ 所持金が足りないため ${skill.name} を使えません。<br>` +
            "別の移動方法に切り替えてください。";
        }

        return;
      }

      progressSteps++;
      time += skill.moveTime;
      money -= skill.maintenance;

      if (money < 0) {
        money = 0;
      }

      if (skill.maxUses !== Infinity) {
        skillUsesLeft[skill.key]--;
      }

      if (camera) {
        stepFromZ = camera.position.z;
        stepToZ = camera.position.z - STEP_WORLD_LENGTH;
        stepProgress = 0;
        isAnimatingStep = true;
      }

      updateTimer();
      updateProgress();
      updateMoveText();
      updateScoreBoard();
      renderSkillShop();

      const remain = selectedShop.travelSteps - progressSteps;
      const status = document.getElementById("status");

      if (remain > 0) {
        if (status) {
          status.innerHTML =
            `<span class="shop-name">${selectedShop.name}</span> に移動中…<br>` +
            `到着まであと ${remain} 回前進 / ${skill.name} を使用`;
        }

        updateLocationText(`${selectedShop.name}へ移動中`);
      } else {
        if (status) {
          status.innerHTML =
            `<span class="shop-name">${selectedShop.name}</span> に到着しました！<br>` +
            "「配達する」を押してください。";
        }

        updateLocationText(`${selectedShop.name} 前`);
        showDeliveryGate();
      }
    }

    function deliver() {
      if (orderFinished) {
        return;
      }

      if (!selectedShop) {
        alert("店を選んでください！");
        return;
      }

      if (progressSteps < selectedShop.travelSteps) {
        const status = document.getElementById("status");

        if (status) {
          status.innerHTML =
            `${selectedShop.name} にまだ到着していません。<br>` +
            "前進してから配達してください。";
        }

        return;
      }

      if (selectedShop.item !== currentOrder.item) {
        const wrongPenalty = 60;
        money = Math.max(0, money - wrongPenalty);

        const status = document.getElementById("status");

        if (status) {
          status.innerHTML =
            "❌ 間違えた店に入ってしまった！<br><br>" +
            `注文：${currentOrder.name}<br>` +
            `選んだ店：${selectedShop.name}<br>` +
            `ペナルティ：-${wrongPenalty}円<br><br>` +
            "正しい種類の店を選び直してください。";
        }

        selectedShop = null;
        progressSteps = 0;

        resetWorldForNewOrder();

        updateProgress();
        updateMoveText();
        updateScoreBoard();
        renderSkillShop();
        saveSkillState();

        return;
      }

      let reward = 220;

      reward -= time;
      reward += Math.floor((1400 - selectedShop.cost) / 10);

      let late = false;

      if (time > currentOrder.timeLimit) {
        late = true;
        reward -= 70;
      }

      let delay = false;
      const delayChance = selectedShop.distanceLabel === "遠い" ? 0.35 : 0.15;

      if (Math.random() < delayChance) {
        delay = true;
        reward -= 20;
      }

      let damage = false;

      if (currentOrder.fragile) {
        const damageChance = selectedShop.distanceLabel === "遠い" ? 0.45 : 0.2;

        if (Math.random() < damageChance) {
          damage = true;
          reward -= 80;
        }
      }

      reward = Math.max(0, reward);

      money += reward;
      totalEarned += reward;

      if (money > bestMoney) {
        bestMoney = money;
      }

      const status = document.getElementById("status");

      if (status) {
        status.innerHTML =
          "✅ 配達完了！<br><br>" +
          `注文：${currentOrder.name}<br>` +
          `店：${selectedShop.name}<br>` +
          `経過時間：${time}秒<br>` +
          `遅延：${delay ? "あり" : "なし"}<br>` +
          `商品状態：${damage ? "崩れた…" : "無事！"}<br>` +
          `時間オーバー：${late ? "あり" : "なし"}<br><br>` +
          `💰 報酬：${reward}円`;
      }

      orderFinished = true;

      const nextBtn = document.getElementById("nextBtn");

      if (nextBtn) {
        nextBtn.style.display = "inline-block";
      }

      updateMoveText();
      updateScoreBoard();
      renderSkillShop();
      saveSkillState();
      updateLocationText("注文完了");

      if (deliveryGate) {
        deliveryGate.material.emissive.setHex(0x14532d);
      }
    }

    function buySkill(skillKey) {
      const skill = movementSkills[skillKey];

      if (!skill) {
        return;
      }

      if (ownedSkills[skillKey]) {
        return;
      }

      if (money < skill.cost) {
        alert("所持金が足りません！");
        return;
      }

      money -= skill.cost;
      ownedSkills[skillKey] = true;

      const status = document.getElementById("status");

      if (status) {
        status.innerHTML =
          `🛒 ${skill.name} を購入しました！<br>` +
          "「使う」で切り替えられます。";
      }

      updateScoreBoard();
      renderSkillShop();
      saveSkillState();
    }

    function setActiveSkill(skillKey) {
      if (!ownedSkills[skillKey]) {
        alert("まだ購入していません！");
        return;
      }

      activeMoveSkill = skillKey;

      const skill = movementSkills[skillKey];
      const status = document.getElementById("status");

      if (status) {
        status.innerHTML =
          `🚀 移動方法を ${skill.name} に変更しました！<br>` +
          `前進1回で経過時間 +${skill.moveTime}秒、維持費 ${skill.maintenance}円です。`;
      }

      updateMoveText();
      renderSkillShop();
      saveSkillState();
    }

    /*
      ここが修正済みポイントです。

      左を見る：
      targetYaw をプラス方向へ動かす

      右を見る：
      targetYaw をマイナス方向へ動かす
    */
    function turnLeft() {
      targetYaw = Math.min(targetYaw + Math.PI / 8, Math.PI / 2.2);
    }

    function turnRight() {
      targetYaw = Math.max(targetYaw - Math.PI / 8, -Math.PI / 2.2);
    }

    function lookCenter() {
      targetYaw = 0;
    }
  </script>
</body>
</html>
