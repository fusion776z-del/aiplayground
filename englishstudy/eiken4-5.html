<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>EIKEN 並べ替えトレーニング 5級・4級（80問）</title>
  <style>
    :root {
      --bg: #080b16;
      --panel: #111827;
      --panel2: #161b2e;
      --line: #26324a;
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --accent: #facc15;
      --btn: #1f2937;
      --btn2: #312e81;
      --ok: #22c55e;
      --ng: #ef4444;
      --info: #3b82f6;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.15), transparent 28%),
        radial-gradient(circle at bottom right, rgba(99, 102, 241, 0.18), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
      padding: 28px 14px;
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    body.drag-lock {
      overflow: hidden;
      touch-action: none;
    }

    .app {
      width: min(560px, 100%);
      border: 1px solid var(--line);
      border-radius: 28px;
      background: rgba(10, 15, 30, 0.92);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    header {
      padding: 26px 22px 18px;
      border-bottom: 1px solid var(--line);
    }

    .tag {
      display: inline-block;
      border: 1px solid rgba(250, 204, 21, 0.45);
      color: var(--accent);
      border-radius: 999px;
      padding: 7px 13px;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.35;
    }

    .lead {
      color: var(--muted);
      line-height: 1.7;
      margin: 12px 0 0;
      font-weight: 600;
      font-size: 14px;
    }

    main {
      padding: 22px;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .grade-list {
      display: grid;
      gap: 14px;
    }

    .grade-card {
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .grade-card strong {
      font-size: 22px;
      display: block;
      margin-bottom: 5px;
    }

    .grade-card span {
      color: var(--muted);
      font-weight: 650;
      font-size: 14px;
    }

    button {
      appearance: none;
      -webkit-appearance: none;
      border: 1px solid var(--line);
      background: var(--btn);
      color: var(--text);
      border-radius: 16px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.08s ease, border-color 0.15s ease, background 0.15s ease, opacity 0.15s ease;
      touch-action: manipulation;
      font-family: inherit;
    }

    button:hover {
      border-color: rgba(250, 204, 21, 0.55);
    }

    button:active {
      transform: scale(0.98);
    }

    .enter-btn {
      background: var(--btn2);
      min-width: 96px;
    }

    .top-actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 18px;
    }

    .back-index {
      border-radius: 999px;
      background: transparent;
    }

    .grade-badge {
      color: var(--accent);
      border: 1px solid rgba(250, 204, 21, 0.45);
      border-radius: 999px;
      padding: 9px 16px;
      font-weight: 900;
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    .shelf {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 13px 15px;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
      color: var(--muted);
      font-weight: 800;
    }

    .quiz-box {
      background: rgba(17, 24, 39, 0.84);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
    }

    .quiz-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      color: var(--muted);
      font-weight: 900;
    }

    .count {
      background: #241f3f;
      border-radius: 999px;
      padding: 6px 11px;
      font-size: 13px;
      color: #ddd6fe;
    }

    .jp {
      font-size: 18px;
      line-height: 1.7;
      font-weight: 850;
      margin: 0 0 16px;
    }

    .answer-area {
      min-height: 76px;
      border: 1px dashed #3f4a65;
      border-radius: 18px;
      padding: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-content: flex-start;
      margin-bottom: 14px;
      background: rgba(2, 6, 23, 0.35);
      touch-action: none;
    }

    .word-bank {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-bottom: 15px;
      touch-action: none;
    }

    .word {
      border-radius: 999px;
      padding: 10px 14px;
      background: #0f172a;
      border: 1px solid #334155;
      font-weight: 900;
      min-height: 42px;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: none;
      cursor: grab;
    }

    .word:active {
      cursor: grabbing;
    }

    .word.used {
      opacity: 0.35;
      pointer-events: none;
    }

    .answer-area .word {
      background: #1e293b;
    }

    .dragging-origin {
      opacity: 0.35;
    }

    .drag-ghost {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 9999;
      pointer-events: none;
      transform: translate(-50%, -50%);
      margin: 0;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
      opacity: 0.96;
      cursor: grabbing;
    }

    .placeholder {
      border: 1px dashed rgba(250, 204, 21, 0.8);
      background: rgba(250, 204, 21, 0.12);
      color: var(--accent);
      border-radius: 999px;
      padding: 10px 14px;
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      font-size: 13px;
      font-weight: 900;
      user-select: none;
      -webkit-user-select: none;
      pointer-events: none;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .buttons .wide {
      grid-column: 1 / -1;
    }

    .check {
      background: rgba(34, 197, 94, 0.18);
      border-color: rgba(34, 197, 94, 0.38);
    }

    .hint {
      background: rgba(250, 204, 21, 0.12);
      border-color: rgba(250, 204, 21, 0.32);
    }

    .message {
      margin-top: 15px;
      border-radius: 18px;
      padding: 14px;
      line-height: 1.7;
      font-weight: 750;
      display: none;
    }

    .message.show {
      display: block;
    }

    .message.ok {
      background: rgba(34, 197, 94, 0.14);
      border: 1px solid rgba(34, 197, 94, 0.35);
    }

    .message.ng {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .message.info {
      background: rgba(59, 130, 246, 0.12);
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .score {
      margin-top: 16px;
      color: var(--muted);
      font-weight: 900;
      text-align: right;
    }

    .small {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      margin-top: 14px;
    }

    @media (max-width: 420px) {
      body {
        padding: 16px 10px;
      }

      header {
        padding: 22px 18px 16px;
      }

      main {
        padding: 18px;
      }

      h1 {
        font-size: 20px;
      }

      .grade-card {
        align-items: stretch;
        flex-direction: column;
      }

      .enter-btn {
        width: 100%;
      }

      .buttons {
        grid-template-columns: 1fr;
      }

      .buttons .wide {
        grid-column: auto;
      }

      .word {
        padding: 11px 15px;
        min-height: 44px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="tag">EIKEN 並べ替えポータル（80問）</div>
      <h1>英検5級・4級<br>英文並べ替えトレーニング</h1>
      <p class="lead">
        日本語に合うように英単語を並べ替えよう。<br>
        ピリオド「.」を入れ忘れても、単語の順番が合っていれば正解。<br>
        単語はタップでもドラッグでも動かせます。
      </p>
    </header>

    <main>
      <section id="indexScreen" class="screen active">
        <div class="grade-list">
          <div class="grade-card">
            <div>
              <strong>5級（40問）</strong>
              <span>be動詞・一般動詞・疑問文・命令文など。</span>
            </div>
            <button type="button" class="enter-btn" onclick="startGrade('grade5')">ENTER</button>
          </div>

          <div class="grade-card">
            <div>
              <strong>4級（40問）</strong>
              <span>過去形・未来表現・比較・不定詞・助動詞など。</span>
            </div>
            <button type="button" class="enter-btn" onclick="startGrade('grade4')">ENTER</button>
          </div>
        </div>

        <p class="small">
          ※ 文型問題はありません。英文の並べ替えのみです。<br>
          ※ 80問（5級40＋4級40）です。
        </p>
      </section>

      <section id="quizScreen" class="screen">
        <div class="top-actions">
          <button type="button" class="back-index" onclick="goIndex()">← INDEX に戻る</button>
          <div id="gradeTitle" class="grade-badge">GRADE</div>
        </div>

        <div class="shelf">
          <span>SHELF</span>
          <span>ALL</span>
        </div>

        <div class="quiz-box">
          <div class="quiz-head">
            <span>SHELF ALL</span>
            <span id="questionCount" class="count">Q1/1</span>
          </div>

          <p id="jpSentence" class="jp"></p>

          <div id="answerArea" class="answer-area" aria-label="answer area"></div>
          <div id="wordBank" class="word-bank" aria-label="word bank"></div>

          <div class="buttons">
            <button type="button" class="check" onclick="checkAnswer()">CHECK</button>
            <button type="button" class="hint" onclick="showHint()">HINT</button>
            <button type="button" onclick="clearAnswer()">CLEAR</button>
            <button type="button" onclick="prevQuestion()">BACK</button>
            <button type="button" class="wide" onclick="nextQuestion()">NEXT</button>
          </div>

          <div id="message" class="message"></div>
        </div>

        <div id="score" class="score">SCORE: 0</div>
      </section>
    </main>
  </div>

        { jp:"この川はあの川より長いです。", answers:["This river is longer than that one."], words:["This","river","is","longer","than","that","one","."] },
        { jp:"私はその知らせを聞いて驚きました。", answers:["I was surprised to hear the news."], words:["I","was","surprised","to","hear","the","news","."] },
        { jp:"彼はそのゲームをやめました。", answers:["He stopped playing the game."], words:["He","stopped","playing","the","game","."] },
        { jp:"私は彼女を助けるためにここに来ました。", answers:["I came here to help her."], words:["I","came","here","to","help","her","."] },
        { jp:"あなたは泳ぐことができますか。", answers:["Can you swim?"], words:["Can","you","swim","?"] },
        { jp:"彼らは来年新しい家を買うでしょう。", answers:["They will buy a new house next year."], words:["They","will","buy","a","new","house","next","year","."] }
      ]
    };

    let currentGrade = "grade5";
    let currentIndex = 0;
    let score = 0;
    let answeredCorrect = new Set();
    let selectedWords = [];

    const wordOrderCache = new Map();

    const indexScreen = document.getElementById("indexScreen");
    const quizScreen = document.getElementById("quizScreen");
    const gradeTitle = document.getElementById("gradeTitle");
    const questionCount = document.getElementById("questionCount");
    const jpSentence = document.getElementById("jpSentence");
    const answerArea = document.getElementById("answerArea");
    const wordBank = document.getElementById("wordBank");
    const message = document.getElementById("message");
    const scoreEl = document.getElementById("score");

    const TAP_THRESHOLD = 8;

    const dragState = {
      active: false,
      from: null,
      wordIndex: null,
      answerPos: null,
      pointerId: null,
      startX: 0,
      startY: 0,
      moved: false,
      ghost: null,
      placeholder: null,
      originEl: null
    };

    function startGrade(grade) {
      currentGrade = grade;
      currentIndex = 0;
      score = 0;
      answeredCorrect = new Set();
      selectedWords = [];
      wordOrderCache.clear();

      indexScreen.classList.remove("active");
      quizScreen.classList.add("active");

      renderQuestion();
    }

    function goIndex() {
      quizScreen.classList.remove("active");
      indexScreen.classList.add("active");
      clearMessage();
      finishDrag();
    }

    function getCurrentQuestion() {
      return questions[currentGrade][currentIndex];
    }

    function ensureWordOrderForCurrentQuestion() {
      const key = `${currentGrade}-${currentIndex}`;
      if (wordOrderCache.has(key)) return;

      const q = getCurrentQuestion();
      const arr = q.words.map((word, index) => ({ word, index }));

      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }

      wordOrderCache.set(key, arr);
    }

    function renderQuestion() {
      const q = getCurrentQuestion();

      selectedWords = [];
      gradeTitle.textContent = currentGrade === "grade5" ? "GRADE5" : "GRADE4";
      questionCount.textContent = `Q${currentIndex + 1}/${questions[currentGrade].length}`;
      jpSentence.textContent = q.jp;

      ensureWordOrderForCurrentQuestion();
      renderAnswerArea();
      renderWordBank();
      updateScore();
      clearMessage();
    }

    function renderAnswerArea() {
      answerArea.innerHTML = "";

      selectedWords.forEach((item, answerPos) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "word";
        btn.textContent = item.word;
        btn.dataset.zone = "answer";
        btn.dataset.wordindex = String(item.index);
        btn.dataset.answerpos = String(answerPos);
        btn.addEventListener("pointerdown", onPointerDownChip, { passive: false });
        answerArea.appendChild(btn);
      });
    }

    function renderWordBank() {
      const key = `${currentGrade}-${currentIndex}`;
      const order = wordOrderCache.get(key) || [];

      wordBank.innerHTML = "";

      order.forEach(({ word, index }) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "word";
        btn.textContent = word;
        btn.dataset.zone = "bank";
        btn.dataset.wordindex = String(index);

        const used = selectedWords.some(item => item.index === index);
        if (used) btn.classList.add("used");

        btn.addEventListener("pointerdown", onPointerDownChip, { passive: false });
        wordBank.appendChild(btn);
      });
    }

    function addWordFromBank(wordIndex, insertAt = null) {
      const q = getCurrentQuestion();

      if (selectedWords.some(item => item.index === wordIndex)) return;

      const obj = {
        word: q.words[wordIndex],
        index: wordIndex
      };

      if (insertAt === null || insertAt === undefined) {
        selectedWords.push(obj);
      } else {
        selectedWords.splice(insertAt, 0, obj);
      }

      renderAnswerArea();
      renderWordBank();
      clearMessage();
    }

    function removeWordFromAnswer(answerPos) {
      if (answerPos == null) return;

      selectedWords.splice(answerPos, 1);
      renderAnswerArea();
      renderWordBank();
      clearMessage();
    }

    function moveAnswerWord(fromIndex, toIndex) {
      if (fromIndex == null || toIndex == null) return;
      if (fromIndex < 0 || fromIndex >= selectedWords.length) return;

      const item = selectedWords[fromIndex];
      selectedWords.splice(fromIndex, 1);

      let target = toIndex;
      if (toIndex > fromIndex) target = toIndex - 1;
      if (target < 0) target = 0;
      if (target > selectedWords.length) target = selectedWords.length;

      selectedWords.splice(target, 0, item);
    }

    function onPointerDownChip(e) {
      const el = e.currentTarget;

      if (el.classList.contains("used") && el.dataset.zone === "bank") return;
      if (!e.isPrimary) return;

      dragState.active = true;
      dragState.from = el.dataset.zone;
      dragState.wordIndex = Number(el.dataset.wordindex);
      dragState.answerPos = el.dataset.answerpos != null ? Number(el.dataset.answerpos) : null;
      dragState.pointerId = e.pointerId;
      dragState.startX = e.clientX;
      dragState.startY = e.clientY;
      dragState.moved = false;
      dragState.originEl = el;

      try {
        el.setPointerCapture(e.pointerId);
      } catch (_) {}

      el.classList.add("dragging-origin");

      dragState.ghost = createGhost(el, e.clientX, e.clientY);
      dragState.placeholder = document.createElement("div");
      dragState.placeholder.className = "placeholder";
      dragState.placeholder.textContent = "ここに入る";

      document.body.classList.add("drag-lock");

      window.addEventListener("pointermove", onPointerMove, { passive: false });
      window.addEventListener("pointerup", onPointerUp, { passive: false });
      window.addEventListener("pointercancel", onPointerCancel, { passive: false });
      window.addEventListener("blur", onWindowBlur);

      e.preventDefault();
    }

    function onPointerMove(e) {
      if (!dragState.active || e.pointerId !== dragState.pointerId) return;

      const dx = e.clientX - dragState.startX;
      const dy = e.clientY - dragState.startY;

      if (!dragState.moved && Math.hypot(dx, dy) > TAP_THRESHOLD) {
        dragState.moved = true;
      }

      moveGhost(e.clientX, e.clientY);

      const overAnswer = isPointInEl(answerArea, e.clientX, e.clientY);

      if (overAnswer) {
        const insertIndex = getInsertIndexInAnswer(e.clientX, e.clientY);
        placePlaceholder(insertIndex);
      } else {
        removePlaceholder();
      }

      e.preventDefault();
    }

    function onPointerUp(e) {
      if (!dragState.active || e.pointerId !== dragState.pointerId) return;

      cleanupOriginClass();

      const wasTap = !dragState.moved;

      if (wasTap) {
        if (dragState.from === "bank") {
          addWordFromBank(dragState.wordIndex);
        } else if (dragState.from === "answer") {
          removeWordFromAnswer(dragState.answerPos);
        }

        finishDrag();
        e.preventDefault();
        return;
      }

      const overAnswer = isPointInEl(answerArea, e.clientX, e.clientY);
      const overBank = isPointInEl(wordBank, e.clientX, e.clientY);

      if (overAnswer) {
        const dropIndex = getPlaceholderIndex();

        if (dragState.from === "bank") {
          addWordFromBank(dragState.wordIndex, dropIndex);
        } else if (dragState.from === "answer") {
          moveAnswerWord(dragState.answerPos, dropIndex);
          renderAnswerArea();
          renderWordBank();
          clearMessage();
        }
      } else if (overBank) {
        if (dragState.from === "answer") {
          removeWordFromAnswer(dragState.answerPos);
        }
      } else {
        renderAnswerArea();
        renderWordBank();
      }

      finishDrag();
      e.preventDefault();
    }

    function onPointerCancel(e) {
      if (!dragState.active || e.pointerId !== dragState.pointerId) return;

      cleanupOriginClass();
      renderAnswerArea();
      renderWordBank();
      finishDrag();
      e.preventDefault();
    }

    function onWindowBlur() {
      cleanupOriginClass();
      renderAnswerArea();
      renderWordBank();
      finishDrag();
    }

    function finishDrag() {
      removePlaceholder();
      removeGhost();
      cleanupOriginClass();

      if (dragState.originEl && dragState.pointerId != null) {
        try {
          dragState.originEl.releasePointerCapture(dragState.pointerId);
        } catch (_) {}
      }

      window.removeEventListener("pointermove", onPointerMove);
      window.removeEventListener("pointerup", onPointerUp);
      window.removeEventListener("pointercancel", onPointerCancel);
      window.removeEventListener("blur", onWindowBlur);

      document.body.classList.remove("drag-lock");

      dragState.active = false;
      dragState.from = null;
      dragState.wordIndex = null;
      dragState.answerPos = null;
      dragState.pointerId = null;
      dragState.startX = 0;
      dragState.startY = 0;
      dragState.moved = false;
      dragState.placeholder = null;
      dragState.originEl = null;
    }

    function createGhost(originEl, x, y) {
      const ghost = originEl.cloneNode(true);
      const rect = originEl.getBoundingClientRect();

      ghost.classList.add("drag-ghost");
      ghost.style.width = `${rect.width}px`;
      ghost.style.height = `${rect.height}px`;

      document.body.appendChild(ghost);
      moveGhost(x, y);

      return ghost;
    }

    function moveGhost(x, y) {
      if (!dragState.ghost) return;

      dragState.ghost.style.left = `${x}px`;
      dragState.ghost.style.top = `${y}px`;
    }

    function removeGhost() {
      if (dragState.ghost && dragState.ghost.parentNode) {
        dragState.ghost.parentNode.removeChild(dragState.ghost);
      }

      dragState.ghost = null;
    }

    function isPointInEl(el, x, y) {
      const rect = el.getBoundingClientRect();

      return (
        x >= rect.left &&
        x <= rect.right &&
        y >= rect.top &&
        y <= rect.bottom
      );
    }

    function getInsertIndexInAnswer(x, y) {
      const chips = [...answerArea.querySelectorAll(".word")];

      if (chips.length === 0) return 0;

      const element = document.elementFromPoint(x, y);
      const chip = element && element.closest
        ? element.closest("#answerArea .word")
        : null;

      if (chip) {
        const rect = chip.getBoundingClientRect();
        const midX = rect.left + rect.width / 2;
        const chipIndex = chips.indexOf(chip);

        return x < midX ? chipIndex : chipIndex + 1;
      }

      let nearestIndex = chips.length;
      let nearestDistance = Infinity;

      chips.forEach((chipEl, index) => {
        const rect = chipEl.getBoundingClientRect();
        const centerY = rect.top + rect.height / 2;
        const distanceY = Math.abs(y - centerY);

        if (distanceY < nearestDistance) {
          nearestDistance = distanceY;

          const midX = rect.left + rect.width / 2;
          nearestIndex = x < midX ? index : index + 1;
        }
      });

      return nearestIndex;
    }

    function placePlaceholder(insertIndex) {
      if (!dragState.placeholder) return;

      const chips = [...answerArea.querySelectorAll(".word")];

      if (dragState.placeholder.parentNode === answerArea) {
        answerArea.removeChild(dragState.placeholder);
      }

      if (insertIndex >= chips.length) {
        answerArea.appendChild(dragState.placeholder);
      } else {
        answerArea.insertBefore(dragState.placeholder, chips[insertIndex]);
      }
    }

    function removePlaceholder() {
      if (dragState.placeholder && dragState.placeholder.parentNode) {
        dragState.placeholder.parentNode.removeChild(dragState.placeholder);
      }
    }

    function getPlaceholderIndex() {
      if (!dragState.placeholder || dragState.placeholder.parentNode !== answerArea) {
        return selectedWords.length;
      }

      const nodes = [...answerArea.children];
      return nodes.indexOf(dragState.placeholder);
    }

    function cleanupOriginClass() {
      document.querySelectorAll(".dragging-origin").forEach(el => {
        el.classList.remove("dragging-origin");
      });
    }

    function normalizeSentence(sentence) {
      return sentence
        .toLowerCase()
        .replace(/[.。]/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function getUserSentence() {
      return selectedWords.map(item => item.word).join(" ");
    }

    function checkAnswer() {
      const q = getCurrentQuestion();
      const user = normalizeSentence(getUserSentence());
      const normalizedAnswers = q.answers.map(answer => normalizeSentence(answer));
      const isCorrect = normalizedAnswers.includes(user);

      if (isCorrect) {
        const key = `${currentGrade}-${currentIndex}`;

        if (!answeredCorrect.has(key)) {
          answeredCorrect.add(key);
          score++;
        }

        showMessage("ok", `正解！<br>${formatAnswers(q.answers)}`);
      } else {
        showMessage("ng", `もう一度！<br>正答・別解はこちら：<br>${formatAnswers(q.answers)}`);
      }

      updateScore();
    }

    function formatAnswers(answers) {
      if (answers.length === 1) {
        return `正答：<strong>${answers[0]}</strong>`;
      }

      return answers.map((answer, index) => {
        if (index === 0) {
          return `正答：<strong>${answer}</strong>`;
        }

        return `別解${index}：<strong>${answer}</strong>`;
      }).join("<br>");
    }

    function showHint() {
      const q = getCurrentQuestion();
      const firstAnswer = q.answers[0];
      const hintWords = firstAnswer
        .replace(/[.?!]/g, "")
        .split(/\s+/)
        .slice(0, 2)
        .join(" ");

      showMessage("info", `HINT：最初は <strong>${hintWords}</strong> ...`);
    }

    function clearAnswer() {
      selectedWords = [];
      renderAnswerArea();
      renderWordBank();
      clearMessage();
    }

    function nextQuestion() {
      const total = questions[currentGrade].length;
      currentIndex = (currentIndex + 1) % total;
      ensureWordOrderForCurrentQuestion();
      renderQuestion();
    }

    function prevQuestion() {
      const total = questions[currentGrade].length;
      currentIndex = (currentIndex - 1 + total) % total;
      ensureWordOrderForCurrentQuestion();
      renderQuestion();
    }

    function showMessage(type, html) {
      message.className = `message show ${type}`;
      message.innerHTML = html;
    }

    function clearMessage() {
      message.className = "message";
      message.innerHTML = "";
    }

    function updateScore() {
      scoreEl.textContent = `SCORE: ${score}`;
    }
  </script>
</body>
</html>
