<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AI Sentence Builder — EIKEN</title>
  <style>
    :root{--bg1:#050611;--bg2:#0c1330;--ink:#eaf2ff;--muted:rgba(234,242,255,.72);--glass:rgba(9,12,24,.74);--warn:#ff5a7a;--gold:#ffd86b;--ok:#7cffc5;--btnIdle:1;--fade:120ms;}
    *{box-sizing:border-box}html,body{height:100%}
    body{margin:0;min-height:100vh;display:grid;place-items:center;color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 12% 14%, rgba(124,255,197,.12), transparent 30%),radial-gradient(circle at 82% 22%, rgba(189,163,255,.10), transparent 28%),radial-gradient(circle at 62% 84%, rgba(255,216,107,.10), transparent 30%),linear-gradient(180deg,var(--bg1),var(--bg2) 55%,var(--bg1));padding:max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));overflow-x:hidden;}
    .index-exit{position:sticky;top:0;z-index:1000;display:flex;justify-content:center;padding:10px;background:linear-gradient(180deg,rgba(5,6,17,.95),rgba(5,6,17,.75) 60%,rgba(5,6,17,0));}
    .index-exit a{text-decoration:none;font-weight:900;letter-spacing:.08em;padding:10px 18px;border-radius:18px;color:#eaf2ff;border:1px solid rgba(124,255,197,.35);background:rgba(10,16,34,.65);backdrop-filter:blur(8px);box-shadow:0 6px 20px rgba(0,0,0,.35);}
    .frame{width:100%;max-width:390px;padding:14px;border-radius:28px;background:var(--glass);backdrop-filter:blur(10px) saturate(1.15);border:1px solid rgba(124,255,197,.20);box-shadow:0 22px 70px rgba(0,0,0,.52),0 0 40px rgba(124,255,197,.08);position:relative;}
    .grade-inframe{display:flex;justify-content:center;align-items:center;margin:2px 0 10px 0;}
    .grade-inframe .badge{font-weight:900;letter-spacing:.12em;padding:9px 22px;border-radius:22px;color:#ffd86b;border:1px solid rgba(255,216,107,.45);background:rgba(10,16,34,.55);box-shadow:0 6px 18px rgba(0,0,0,.35);}
    .card{margin-top:12px;border-radius:18px;background:rgba(10,16,34,.28);border:1px solid rgba(124,255,197,.12);box-shadow:0 10px 26px rgba(0,0,0,.25);padding:12px;display:grid;gap:10px;}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.row > *{flex:1;min-width:0}.row label{font-size:12px;color:var(--muted);font-weight:800;letter-spacing:.06em;flex:0 0 auto;}
    select,input{width:100%;background:#d9d9d9;color:#111;border:1px solid #bdbdbd;border-radius:10px;outline:none;font-weight:800;letter-spacing:.02em;padding:9px 10px;}
    .chip{font-size:11px;letter-spacing:.06em;padding:6px 10px;border-radius:999px;border:1px solid rgba(189,163,255,.20);background:rgba(189,163,255,.10);color:rgba(234,242,255,.86);display:inline-flex;}
    .jp{font-size:15px;font-weight:900;letter-spacing:.02em;line-height:1.45}.scene{font-size:12px;color:rgba(234,242,255,.70);line-height:1.45}
    .slots{min-height:78px;border-radius:18px;padding:10px;border:1px dashed rgba(255,255,255,.18);background:rgba(10,16,34,.20);display:flex;flex-wrap:wrap;gap:8px;align-items:center;color:#fff;}
    .bank{min-height:92px;border-radius:18px;padding:10px;border:1px solid rgba(124,255,197,.12);background:rgba(10,16,34,.16);display:flex;flex-wrap:wrap;gap:8px;align-items:center;color:#fff;}
    .tok{display:inline-flex;align-items:center;gap:8px;padding:10px 12px;border-radius:16px;border:1px solid rgba(124,255,197,.20);background:rgba(10,16,34,.22);color:#fff;font-weight:900;letter-spacing:.04em;cursor:pointer;user-select:none;opacity:1;transition:opacity var(--fade) ease,transform var(--fade) ease,background var(--fade) ease,border-color var(--fade) ease;touch-action:manipulation;}
    .tok:active{transform:scale(.97)}
    .actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:space-between;align-items:center}.btn{flex:1;min-width:112px;padding:12px 14px;border-radius:18px;border:1px solid rgba(124,255,197,.18);background:rgba(10,16,34,.26);color:rgba(255,255,255,.92);font-weight:900;letter-spacing:.06em;cursor:pointer;opacity:.92}.btn.primary{border-color:rgba(124,255,197,.30);background:rgba(124,255,197,.14)}.btn.gold{border-color:rgba(255,216,107,.28);background:rgba(255,216,107,.10)}.btn:disabled{opacity:.55;cursor:wait;}
    .status{border-radius:18px;padding:12px;border:1px solid rgba(255,255,255,.10);background:rgba(10,16,34,.18);display:grid;gap:8px}.status .line{display:flex;gap:10px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap}.status .msg{font-weight:900;letter-spacing:.04em;white-space:pre-line}.status .sub{color:rgba(234,242,255,.70);font-size:12px;line-height:1.45;white-space:pre-line}
    .explain{border-radius:18px;padding:12px;border:1px solid rgba(255,216,107,.18);background:rgba(255,216,107,.06);display:none;gap:10px}.explain.show{display:grid}.explain h3{margin:0;font-size:13px;letter-spacing:.06em}.explain .p{color:rgba(234,242,255,.86);font-size:12.5px;line-height:1.55}.explain .mono{white-space:pre-line;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:rgba(234,242,255,.82)}
    @media (max-width:420px){.frame{padding:12px;border-radius:22px}.btn{min-width:96px}.jp{font-size:14px}.tok{padding:9px 10px;border-radius:14px}}
  </style>
</head>
<body>
  <main>
    <div class="index-exit"><a href="index.html">← INDEX に戻る</a></div>
    <div class="frame">
      <div class="grade-inframe"><div class="badge">AI AUTO</div></div>

      <section class="card" aria-label="AI問題生成設定">
        <div class="row">
          <label for="gradeSel">GRADE</label>
          <select id="gradeSel">
            <option value="3">3級</option>
            <option value="pre2">準2級</option>
            <option value="2">2級</option>
            <option value="pre1">準1級</option>
          </select>
        </div>
        <div class="row">
          <label for="skillSel">SHELF</label>
          <select id="skillSel">
            <option value="all">ALL</option>
            <option value="tense">時制</option>
            <option value="modal">助動詞</option>
            <option value="prep">前置詞</option>
            <option value="conj">接続詞</option>
            <option value="comp">比較</option>
            <option value="qneg">疑問文/否定文</option>
            <option value="pron">代名詞・数量</option>
            <option value="verbprep">動詞＋前置詞</option>
            <option value="rel">関係詞</option>
            <option value="passive">受動態</option>
            <option value="subj">仮定法</option>
            <option value="inv">倒置</option>
            <option value="part">分詞構文</option>
            <option value="emph">強調構文</option>
            <option value="usage">語法</option>
          </select>
        </div>
        <div class="row">
          <label for="jpInput">日本語指定</label>
          <input id="jpInput" placeholder="空欄ならAIが問題文から作ります" />
        </div>
        <button id="btnAI" class="btn gold" type="button">AI問題生成</button>
      </section>

      <section class="card" aria-label="問題">
        <div class="row" style="justify-content:space-between">
          <span class="chip">Q <span id="qIndex">0</span></span>
          <span class="chip">5文型</span>
        </div>
        <div id="jpPrompt" class="jp">AI問題生成を押してください。</div>
        <div id="scenePrompt" class="scene">—</div>
        <div class="scene">並べ替え欄</div>
        <div id="slots" class="slots"></div>
        <div class="scene">BANK</div>
        <div id="bank" class="bank"></div>
        <div class="row">
          <label for="patternSel">5文型</label>
          <select id="patternSel"><option value="">選択…</option></select>
        </div>
        <div class="actions">
          <button id="btnCheck" class="btn primary" type="button">CHECK</button>
          <button id="btnHint" class="btn gold" type="button">HINT</button>
          <button id="btnClear" class="btn" type="button">CLEAR</button>
          <button id="btnNext" class="btn" type="button">NEXT</button>
        </div>
        <div class="status" aria-live="polite">
          <div class="line"><div class="msg" id="statusMsg">英文＋5文型を答えよう。</div><div class="msg">SCORE: <span id="score">0</span></div></div>
          <div class="sub" id="statusSub">APIキーはブラウザ側ではなく server.py 側で使います。</div>
        </div>
        <div id="explain" class="explain">
          <h3 id="expTitle">解説</h3>
          <div class="mono" id="expDiff">—</div>
          <div class="p" id="expBody">—</div>
          <div class="p">正解例: <span id="targetPreview"></span></div>
        </div>
      </section>
    </div>
  </main>
  <script src="ai_client.js"></script>
</body>
</html>
