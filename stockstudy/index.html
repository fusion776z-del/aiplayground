<!doctype html>
<html lang="ja">
<head>

<title>しぶちゃんの株価分析（50問＋一目均衡表）</title>

<style>
:root{
  --bg1:#050611; --bg2:#0c1330;
  --ink:#eaf2ff; --muted:rgba(234,242,255,.72);
  --glass:rgba(9,12,24,.72);
  --stroke:rgba(124,255,197,.18);
  --accent:#7cffc5; --gold:#ffd86b;
  --red:#ff6b8a; --blue:#62a8ff;
  --cyan:#63e6ff; --violet:#c7a6ff;
  --shadow:0 22px 70px rgba(0,0,0,.55);
  --btn:rgba(255,255,255,.06);
  --btnH:rgba(124,255,197,.14);
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; color:var(--ink);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at 12% 14%, rgba(124,255,197,.14), transparent 32%),
    radial-gradient(circle at 82% 22%, rgba(189,163,255,.12), transparent 30%),
    radial-gradient(circle at 62% 84%, rgba(255,216,107,.12), transparent 32%),
    linear-gradient(180deg,var(--bg1),var(--bg2) 55%,var(--bg1));
  display:grid; place-items:center; padding:14px; overflow-x:hidden;
}
.phone{
  width:min(375px,100%);
  aspect-ratio:375/667;
  max-height:92vh;
  border-radius:34px;
  background:var(--glass);
  border:1px solid var(--stroke);
  box-shadow:var(--shadow),0 0 40px rgba(124,255,197,.08);
  backdrop-filter:blur(10px) saturate(1.15);
  overflow:hidden; position:relative;
  display:flex; flex-direction:column;
}
.bezel{ position:absolute; inset:10px; border-radius:28px; border:1px solid rgba(255,255,255,.08); pointer-events:none;}
.top{ padding:22px 18px 10px; display:flex; flex-direction:column; gap:10px;}
.badge{
  align-self:flex-start; font-size:11px; letter-spacing:.08em; font-weight:800;
  padding:7px 10px; border-radius:999px;
  border:1px solid rgba(255,216,107,.26);
  background:rgba(255,216,107,.08);
  color:rgba(255,255,255,.92);
}
h1{ margin:0; font-size:18px; line-height:1.25; letter-spacing:.02em; font-weight:950;}
.sub{ margin:0; font-size:12.5px; color:var(--muted); line-height:1.5;}

.controls{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  margin-top:6px;
}
.pill{
  border:1px solid rgba(189,163,255,.18);
  background:rgba(255,255,255,.05);
  color:rgba(255,255,255,.88);
  border-radius:999px;
  padding:8px 10px;
  font-weight:900;
  font-size:11px;
  letter-spacing:.06em;
  display:flex; align-items:center; gap:8px;
  user-select:none;
}
.toggle{
  width:40px; height:22px; border-radius:999px;
  border:1px solid rgba(124,255,197,.22);
  background:rgba(124,255,197,.10);
  position:relative;
  cursor:pointer;
  flex:0 0 auto;
}
.toggle::after{
  content:"";
  position:absolute; top:2px; left:2px;
  width:18px; height:18px; border-radius:50%;
  background:rgba(255,255,255,.9);
  transition:transform 120ms ease;
}
.toggle.off{
  border-color:rgba(255,107,138,.25);
  background:rgba(255,107,138,.08);
}
.toggle.off::after{ transform:translateX(18px); }

.content{
  padding:10px 18px 18px;
  display:flex; flex-direction:column; gap:10px;
  flex:1; min-height:0;
  overflow-y:auto; -webkit-overflow-scrolling:touch;
}
.card{
  border:1px solid rgba(124,255,197,.14);
  background:var(--btn);
  border-radius:18px;
  padding:13px;
}
.row{ display:flex; align-items:center; justify-content:space-between; gap:10px;}
.qno{ font-size:11px; letter-spacing:.08em; color:rgba(234,242,255,.72); font-weight:900;}
.pct{
  font-size:13px; font-weight:950;
  padding:7px 10px; border-radius:999px;
  border:1px solid rgba(124,255,197,.22);
  background:rgba(124,255,197,.08);
  color:var(--accent);
  white-space:nowrap;
}
.pct.down{ border-color:rgba(255,107,138,.24); background:rgba(255,107,138,.09); color:var(--red); }
.pct.flat{ border-color:rgba(255,216,107,.26); background:rgba(255,216,107,.08); color:var(--gold); }

.question{ margin:8px 0 10px; font-size:14px; line-height:1.55; font-weight:900; }
.chart{
  width:100%; height:154px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(0,0,0,.18);
  overflow:hidden;
}
.legend{
  margin-top:8px;
  display:flex; flex-wrap:wrap; gap:8px;
  font-size:10.5px; color:rgba(234,242,255,.72); font-weight:900;
}
.dot{ display:inline-block; width:10px; height:10px; border-radius:999px; margin-right:6px; vertical-align:-1px;}
.dot.ma{ background:rgba(255,216,107,.9); }
.dot.vol{ background:rgba(98,168,255,.55); }
.dot.tenkan{ background:rgba(99,230,255,.95); }
.dot.kijun{ background:rgba(199,166,255,.92); }
.dot.chikou{ background:rgba(234,242,255,.55); }
.dot.kumoG{ background:rgba(124,255,197,.28); border:1px solid rgba(124,255,197,.55); }
.dot.kumoR{ background:rgba(255,107,138,.24); border:1px solid rgba(255,107,138,.55); }

.choices{ display:grid; gap:8px; margin-top:10px; }
button.choice{
  width:100%; text-align:left;
  color:rgba(255,255,255,.92);
  font-weight:900; letter-spacing:.02em;
  border-radius:14px;
  border:1px solid rgba(189,163,255,.18);
  background:rgba(255,255,255,.06);
  padding:11px 12px;
  cursor:pointer;
}
button.choice:active{ transform:scale(.99); }
button.choice.correct{ border-color:rgba(124,255,197,.55); background:rgba(124,255,197,.16); }
button.choice.wrong{ border-color:rgba(255,107,138,.50); background:rgba(255,107,138,.13); }
.answer{ display:none; margin-top:10px; color:rgba(234,242,255,.78); font-size:12px; line-height:1.55; }
.answer.show{ display:block; }

.footer{
  padding:12px 18px 18px;
  border-top:1px solid rgba(255,255,255,.08);
  color:rgba(234,242,255,.62);
  font-size:11px;
  line-height:1.45;
}
.score{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
.reset{
  color:rgba(255,255,255,.9);
  border:1px solid rgba(124,255,197,.18);
  background:rgba(124,255,197,.08);
  border-radius:999px;
  padding:8px 10px;
  font-weight:900;
}
.mini{ margin:8px 0 0; color:rgba(234,242,255,.62); }

@media (prefers-reduced-motion: reduce){
  button.choice{ transition:none; }
}
</style>
</head>

<body>
<main class="phone" role="main" aria-label="しぶちゃんの株価分析 50問（一目均衡表付き）">
  <div class="bezel" aria-hidden="true"></div>

  <header class="top">
    <div class="badge">株価の部屋</div>
    <h1>チャート分析：上がる？下がる？<br>50問（％で傾向表示）</h1>
    <p class="sub">ローソク足・ひげ・出来高・移動平均・一目均衡表を見て、次が上昇傾向か下降傾向かを判断。</p>

    <div class="controls">
      <div class="pill" title="一目均衡表（転換線・基準線・雲・遅行線）">
        一目均衡表
        <div id="ichimokuToggle" class="toggle" role="switch" aria-checked="true" tabindex="0"></div>
      </div>
      <div class="pill" id="seedPill">SEED: -</div>
    </div>
  </header>

  <section class="content" id="quiz"></section>

  <footer class="footer">
    <div class="score">
      <span id="scoreText">正答 0 / 0</span>
      <button class="reset" type="button" onclick="resetQuiz()">RESET（50問を再生成）</button>
    </div>
    <p class="mini">※学習用の架空チャートです。投資助言ではありません。</p>
  </footer>
</main>

<script>
/* ========= 乱数（再現性） ========= */
function mulberry32(seed){
  let a = seed >>> 0;
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t ^= t + Math.imul(t ^ t >>> 7, 61 | t);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}
let SEED = (Date.now() ^ (Math.random()*1e9)) | 0;
let R = mulberry32(SEED);

/* ========= ユーティリティ ========= */
const clamp = (x,a,b)=>Math.max(a,Math.min(b,x));
const lerp = (a,b,t)=>a+(b-a)*t;
const pick = (arr)=>arr[Math.floor(R()*arr.length)];
const rnorm = ()=>{ // ざっくり正規っぽい（Box–Muller）
  const u = Math.max(1e-9, R()), v = Math.max(1e-9, R());
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
};

/* ========= 一目均衡表（簡略） =========
  本来のシフト(先行+26/遅行-26)は、学習UIの見やすさ優先で
  同一時間軸に描画する“簡略表示”にしています。
*/
function rollingHigh(arr, i, win){
  let s = Math.max(0, i-win+1);
  let m = -Infinity;
  for(let k=s;k<=i;k++) m = Math.max(m, arr[k]);
  return m;
}
function rollingLow(arr, i, win){
  let s = Math.max(0, i-win+1);
  let m = Infinity;
  for(let k=s;k<=i;k++) m = Math.min(m, arr[k]);
  return m;
}
function computeIchimoku(candles){
  const n = candles.length;
  const highs = candles.map(c=>c[1]);
  const lows  = candles.map(c=>c[2]);
  const closes= candles.map(c=>c[3]);

  const tenkan=[], kijun=[], spanA=[], spanB=[], chikou=[];
  for(let i=0;i<n;i++){
    const th = rollingHigh(highs,i,3), tl = rollingLow(lows,i,3);
    const kh = rollingHigh(highs,i,6), kl = rollingLow(lows,i,6);
    const bh = rollingHigh(highs,i,12), bl= rollingLow(lows,i,12);

    const t = (th+tl)/2;
    const k = (kh+kl)/2;
    const a = (t+k)/2;
    const b = (bh+bl)/2;

    tenkan.push(t);
    kijun.push(k);
    spanA.push(a);
    spanB.push(b);

    // 遅行線（簡略）：少し遅らせた終値を同じxに表示
    const lag = 3;
    chikou.push(closes[Math.max(0, i-lag)]);
  }
  return {tenkan,kijun,spanA,spanB,chikou};
}

/* ========= チャート生成（12本） ========= */
function genSeries({trend="flat", volatility=1.2, wick="normal", volume="flat"}){
  const n = 12;

  // 初期価格
  let p = 90 + R()*40; // 90〜130
  const drift =
    trend==="up"   ? (0.9 + R()*0.9) :
    trend==="down" ? (-0.9 - R()*0.9) :
                     (R()*0.2 - 0.1);

  const candles=[];
  const vols=[];

  for(let i=0;i<n;i++){
    const open = p + rnorm()*volatility*0.6;
    const close = open + drift + rnorm()*volatility;

    let hi = Math.max(open, close) + Math.abs(rnorm())*volatility*0.9;
    let lo = Math.min(open, close) - Math.abs(rnorm())*volatility*0.9;

    // ひげ特徴
    if(wick==="upperLong" && i>6){
      hi += 2.2 + R()*2.2;
    }
    if(wick==="lowerLong" && i>6){
      lo -= 2.2 + R()*2.2;
    }
    if(wick==="squeeze"){
      // レンジ縮小
      hi = lerp(hi, Math.max(open,close)+0.8, 0.6);
      lo = lerp(lo, Math.min(open,close)-0.8, 0.6);
    }

    candles.push([open, hi, lo, close]);
    p = close;

    // 出来高
    let v = 45 + R()*20;
    if(volume==="up") v = 35 + i*4 + R()*8;
    if(volume==="down") v = 85 - i*4 + R()*8;
    if(volume==="spike" && i>7) v = 75 + R()*25;
    vols.push(clamp(v, 15, 100));
  }

  // MA（簡易：3本平均をさらになめらかに）
  const closes = candles.map(c=>c[3]);
  const ma = closes.map((_,i)=>{
    const s = Math.max(0,i-2);
    let sum=0;
    for(let k=s;k<=i;k++) sum += closes[k];
    return sum / (i-s+1);
  }).map((v,i)=> i===0 ? v : (0.55*v + 0.45*closes[i])); // ちょい終値寄り

  return {candles, vol:vols, ma};
}

/* ========= シナリオ（答えと説明の骨格） ========= */
const SCENARIOS = [
  {
    ans:"up",
    bias:[68,88],
    title:()=> "価格が雲の上。転換線＞基準線。雲も緑寄り。",
    explain:()=> "雲上＋転換線が基準線の上は上昇優位の形。押し目が浅くなりやすい。",
    gen:()=> genSeries({trend:"up", volatility:1.25, wick:"normal", volume:pick(["up","spike","flat"])})
  },
  {
    ans:"down",
    bias:[68,88],
    title:()=> "価格が雲の下。転換線＜基準線。戻しても雲が抵抗。",
    explain:()=> "雲下＋転換線が基準線の下は下降優位。雲が上値抵抗として意識されやすい。",
    gen:()=> genSeries({trend:"down", volatility:1.35, wick:"normal", volume:pick(["up","spike","flat"])})
  },
  {
    ans:"up",
    bias:[60,80],
    title:()=> "雲の中→上抜け気味。出来高が増えてきた。",
    explain:()=> "雲抜けは転換サインになりやすい。出来高が伴うと上抜けの信頼度が上がる。",
    gen:()=> genSeries({trend:"up", volatility:1.15, wick:"normal", volume:"up"})
  },
  {
    ans:"down",
    bias:[60,80],
    title:()=> "雲付近で上ひげが増加。高値更新に失敗しやすい。",
    explain:()=> "上ひげ増は押し戻し圧力。雲で止められると下方向へ傾きやすい。",
    gen:()=> genSeries({trend:"down", volatility:1.2, wick:"upperLong", volume:"flat"})
  },
  {
    ans:"up",
    bias:[58,76],
    title:()=> "下ひげが長く、安値を割らずに反発。買い支えが見える。",
    explain:()=> "長い下ひげは下での買い支え。安値を割らないなら反発～上昇へ繋がる形。",
    gen:()=> genSeries({trend:"up", volatility:1.25, wick:"lowerLong", volume:pick(["flat","spike"])})
  },
  {
    ans:"down",
    bias:[58,76],
    title:()=> "陰線が続き、移動平均も右下がり。戻り売りが入りやすい。",
    explain:()=> "終値の切り下げ＋MA下向きは売り優勢。戻しても売られやすい。",
    gen:()=> genSeries({trend:"down", volatility:1.3, wick:"normal", volume:"up"})
  },
  {
    ans:"flat",
    bias:[50,55],
    title:()=> "三角持ち合いっぽく値幅縮小。出来高も減少。",
    explain:()=> "値幅縮小＋出来高減はブレイク待ちの典型。方向感が弱く様子見が合理的。",
    gen:()=> genSeries({trend:"flat", volatility:0.65, wick:"squeeze", volume:"down"})
  },
  {
    ans:"flat",
    bias:[50,55],
    title:()=> "雲をまたいで往復。転換線と基準線も近い。",
    explain:()=> "雲の中～付近は中立地帯になりやすい。明確な抜けを待つ局面。",
    gen:()=> genSeries({trend:"flat", volatility:0.8, wick:"normal", volume:"flat"})
  },
  {
    ans:"up",
    bias:[62,82],
    title:()=> "転換線が基準線を上抜け（好転）気味。遅行線も持ち直し。",
    explain:()=> "好転は上方向のシグナル。雲上なら強め、雲中なら抜け確認がカギ。",
    gen:()=> genSeries({trend:"up", volatility:1.05, wick:"normal", volume:pick(["flat","up"])})
  },
  {
    ans:"down",
    bias:[62,82],
    title:()=> "転換線が基準線を下抜け（逆転）気味。遅行線も弱い。",
    explain:()=> "逆転は下方向シグナル。雲下なら戻り売りが入りやすい。",
    gen:()=> genSeries({trend:"down", volatility:1.05, wick:"normal", volume:pick(["flat","up"])})
  },
];

/* ========= 問題50個生成 ========= */
function randInt(a,b){ return Math.floor(lerp(a, b+1, R())); }

function makeProblem(i){
  const sc = pick(SCENARIOS);
  const base = sc.gen();
  const ichi = computeIchimoku(base.candles);

  // 雲色を“最後のA/B”で決める（表示用）
  // bias（％）
  let bias = randInt(sc.bias[0], sc.bias[1]);

  // flatは50〜55固定帯
  if(sc.ans==="flat") bias = randInt(50,55);

  return {
    title: sc.title(),
    ans: sc.ans,
    bias,
    explain: "解説：" + sc.explain(),
    candles: base.candles,
    ma: base.ma,
    vol: base.vol,
    ichi
  };
}

function generateProblems(count){
  const arr=[];
  for(let i=0;i<count;i++) arr.push(makeProblem(i));
  return arr;
}

/* ========= 描画 ========= */
let showIchimoku = true;
let problems = [];

function yScale(v, min, max){
  return 132 - ((v-min)/(max-min))*104;
}
function polyPoints(series, start, gap, min, max){
  return series.map((v,i)=>`${start+i*gap},${yScale(v,min,max).toFixed(1)}`).join(" ");
}

function drawChart(p){
  const n = p.candles.length;
  const start = 28;
  const gap = (320 - 2*start) / (n-1);

  const vals = [];
  p.candles.forEach(c => vals.push(...c));
  vals.push(...p.ma);
  if(showIchimoku && p.ichi){
    vals.push(...p.ichi.tenkan, ...p.ichi.kijun, ...p.ichi.spanA, ...p.ichi.spanB, ...p.ichi.chikou);
  }
  const min = Math.min(...vals) - 2;
  const max = Math.max(...vals) + 2;

  let svg = `<svg viewBox="0 0 320 154" width="100%" height="100%" role="img" aria-label="ローソク足チャート（一目均衡表付き）">`;

  // 背景線
  svg += `<line x1="14" y1="132" x2="306" y2="132" stroke="rgba(255,255,255,.18)" />`;
  svg += `<line x1="14" y1="80" x2="306" y2="80" stroke="rgba(255,255,255,.08)" />`;

  // 雲
  if(showIchimoku && p.ichi){
    const A = p.ichi.spanA, B = p.ichi.spanB;
    const upCloud = A[A.length-1] >= B[B.length-1];
    const fill = upCloud ? "rgba(124,255,197,.18)" : "rgba(255,107,138,.16)";
    const stroke = upCloud ? "rgba(124,255,197,.40)" : "rgba(255,107,138,.38)";

    const top = polyPoints(A, start, gap, min, max);
    const bottom = B.slice().reverse().map((v,i)=>{
      const x = start + (n-1-i)*gap;
      return `${x},${yScale(v,min,max).toFixed(1)}`;
    }).join(" ");

    svg += `<polygon points="${top} ${bottom}" fill="${fill}" stroke="${stroke}" stroke-width="1" />`;
    svg += `<polyline fill="none" stroke="${stroke}" stroke-width="1.6" stroke-dasharray="4 4" points="${top}" />`;
    svg += `<polyline fill="none" stroke="${stroke}" stroke-width="1.6" stroke-dasharray="4 4" points="${polyPoints(B, start, gap, min, max)}" />`;
  }

  // MA
  svg += `<polyline fill="none" stroke="rgba(255,216,107,.9)" stroke-width="2" points="${polyPoints(p.ma, start, gap, min, max)}" />`;

  // 転換線・基準線・遅行線
  if(showIchimoku && p.ichi){
    svg += `<polyline fill="none" stroke="rgba(99,230,255,.95)" stroke-width="2" points="${polyPoints(p.ichi.tenkan, start, gap, min, max)}" />`;
    svg += `<polyline fill="none" stroke="rgba(199,166,255,.92)" stroke-width="2" points="${polyPoints(p.ichi.kijun, start, gap, min, max)}" />`;
    svg += `<polyline fill="none" stroke="rgba(234,242,255,.55)" stroke-width="1.6" stroke-dasharray="5 5" points="${polyPoints(p.ichi.chikou, start, gap, min, max)}" />`;
  }

  // ローソク
  p.candles.forEach((c,i)=>{
    const [o,hi,lo,cl] = c;
    const x = start + i*gap;
    const up = cl >= o;
    const col = up ? "#7cffc5" : "#ff6b8a";

    const yo = yScale(o,min,max);
    const yc = yScale(cl,min,max);
    const yh = yScale(hi,min,max);
    const yl = yScale(lo,min,max);

    const top = Math.min(yo,yc);
    const bodyH = Math.max(5, Math.abs(yo-yc));

    svg += `<line x1="${x}" y1="${yh}" x2="${x}" y2="${yl}" stroke="${col}" stroke-width="2" />`;
    svg += `<rect x="${(x-8).toFixed(1)}" y="${top.toFixed(1)}" width="16" height="${bodyH.toFixed(1)}" rx="3" fill="${col}" opacity=".82" />`;
  });

  // 出来高
  p.vol.forEach((v,i)=>{
    const x = start + i*gap - 7;
    const vh = 20*(v/100);
    svg += `<rect x="${x.toFixed(1)}" y="${(150-vh).toFixed(1)}" width="14" height="${vh.toFixed(1)}" rx="2" fill="rgba(98,168,255,.35)" />`;
  });

  svg += `</svg>`;
  return svg;
}

function pctLabel(p){
  if(p.ans==="flat") return `<span class="pct flat">中立/様子見 ${p.bias}%</span>`;
  if(p.ans==="up")   return `<span class="pct">上昇傾向 ${p.bias}%</span>`;
  return `<span class="pct down">下降傾向 ${p.bias}%</span>`;
}

function legendHTML(p){
  if(!showIchimoku) {
    return `
      <div class="legend">
        <span><i class="dot ma"></i>移動平均</span>
        <span><i class="dot vol"></i>出来高</span>
      </div>
    `;
  }
  const cloudIsGreen = (p.ichi.spanA[p.ichi.spanA.length-1] >= p.ichi.spanB[p.ichi.spanB.length-1]);
  const cloudDot = cloudIsGreen ? "kumoG" : "kumoR";
  return `
    <div class="legend">
      <span><i class="dot ma"></i>移動平均</span>
      <span><i class="dot vol"></i>出来高</span>
      <span><i class="dot tenkan"></i>転換線</span>
      <span><i class="dot kijun"></i>基準線</span>
      <span><i class="dot ${cloudDot}"></i>雲(先行A/B)</span>
      <span><i class="dot chikou"></i>遅行線</span>
    </div>
  `;
}

function render(){
  const root = document.getElementById("quiz");
  root.innerHTML = problems.map((p,i)=>`
    <article class="card" data-ans="${p.ans}">
      <div class="row">
        <span class="qno">QUESTION ${String(i+1).padStart(2,"0")} / 50</span>
        ${pctLabel(p)}
      </div>
      <p class="question">${p.title}</p>
      <div class="chart">${drawChart(p)}</div>
      ${legendHTML(p)}
      <div class="choices">
        <button class="choice" type="button" onclick="judge(this,'up')">A. 上がる傾向</button>
        <button class="choice" type="button" onclick="judge(this,'down')">B. 下がる傾向</button>
        <button class="choice" type="button" onclick="judge(this,'flat')">C. まだ判断しにくい</button>
      </div>
      <div class="answer">${p.explain}</div>
    </article>
  `).join("");

  updateScore();
}

function judge(btn, choice){
  const card = btn.closest(".card");
  if(card.dataset.done) return;
  card.dataset.done = "1";

  const ans = card.dataset.ans;

  [...card.querySelectorAll(".choice")].forEach(b=>{
    const c = b.textContent.includes("上がる") ? "up" : b.textContent.includes("下がる") ? "down" : "flat";
    if(c === ans) b.classList.add("correct");
  });

  if(choice !== ans) btn.classList.add("wrong");
  card.querySelector(".answer").classList.add("show");
  updateScore();
}

function updateScore(){
  const done = [...document.querySelectorAll('.card[data-done="1"]')];
  const correct = done.filter(card => card.querySelector(".choice.correct") && !card.querySelector(".choice.wrong")).length;
  document.getElementById("scoreText").textContent = `正答 ${correct} / ${done.length}`;
}

/* ========= RESET（50問再生成） ========= */
function resetQuiz(){
  SEED = (Date.now() ^ (Math.random()*1e9)) | 0;
  R = mulberry32(SEED);
  document.getElementById("seedPill").textContent = `SEED: ${SEED}`;

  problems = generateProblems(50);
  render();
}

/* ========= 一目表示トグル ========= */
const t = document.getElementById("ichimokuToggle");
function setToggle(){
  t.classList.toggle("off", !showIchimoku);
  t.setAttribute("aria-checked", String(showIchimoku));
}
t.addEventListener("click", ()=>{
  showIchimoku = !showIchimoku;
  setToggle();
  render();
});
t.addEventListener("keydown", (e)=>{
  if(e.key === "Enter" || e.key === " "){
    e.preventDefault();
    showIchimoku = !showIchimoku;
    setToggle();
    render();
  }
});

setToggle();
resetQuiz();
</script>
</body>
</html>
