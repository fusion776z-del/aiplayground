<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>キューブリバーシ 3D 修正版</title><style>
:root{--size:min(68vw,68vh,520px);--text:#f8fafc;--muted:#cbd5e1;--legal:#facc15}*{box-sizing:border-box}body{margin:0;min-height:100svh;background:radial-gradient(circle at top,#263b60,#08111f 65%);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;overflow:hidden;touch-action:none}.app{display:grid;grid-template-columns:1fr 330px;height:100svh}@media(max-width:850px){.app{grid-template-columns:1fr;grid-template-rows:1fr auto}.side{max-height:38svh;overflow:auto}.rules{display:none}}.stage{position:relative;display:grid;place-items:center;perspective:1200px;overflow:hidden}.title{position:absolute;top:14px;left:16px;right:16px;text-align:center;pointer-events:none}.title h1{margin:0 0 4px;font-size:clamp(24px,5vw,44px)}.title p{margin:0;color:var(--muted);font-size:13px}.scene{width:var(--size);height:var(--size);position:relative;transform-style:preserve-3d}.cube{width:100%;height:100%;position:relative;transform-style:preserve-3d}.face{position:absolute;width:var(--size);height:var(--size);display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:3px;padding:10px;border:2px solid #fff5;box-shadow:inset 0 0 40px #0008;backface-visibility:visible}.face:before{content:attr(data-label);position:absolute;top:8px;left:10px;font-weight:900;text-shadow:0 2px 8px #000;pointer-events:none}.F{background:#6d28d9cc;transform:translateZ(calc(var(--size)/2))}.B{background:#475569cc;transform:rotateY(180deg) translateZ(calc(var(--size)/2))}.R{background:#be123ccc;transform:rotateY(90deg) translateZ(calc(var(--size)/2))}.L{background:#b45309cc;transform:rotateY(-90deg) translateZ(calc(var(--size)/2))}.U{background:#1d4ed8cc;transform:rotateX(90deg) translateZ(calc(var(--size)/2))}.D{background:#047857cc;transform:rotateX(-90deg) translateZ(calc(var(--size)/2))}.cell{border:1px solid #fff6;background:#ffffff1f;border-radius:8px;display:grid;place-items:center;position:relative;cursor:pointer;appearance:none;padding:0}.cell.legal{outline:4px solid var(--legal);outline-offset:-4px;background:#facc1538}.cell.legal:after{content:"";width:18%;height:18%;border-radius:50%;background:var(--legal);position:absolute}.disc{width:72%;height:72%;border-radius:50%;box-shadow:inset 0 6px 10px #fff4,inset 0 -8px 12px #0008,0 3px 12px #0008;border:2px solid #0008;pointer-events:none}.black{background:linear-gradient(135deg,#020617,#334155)}.white{background:linear-gradient(135deg,#fff,#cbd5e1);border-color:#fff8}.side{background:#111827dd;border-left:1px solid #fff2;padding:14px;display:flex;flex-direction:column;gap:12px}.card{background:#ffffff10;border:1px solid #ffffff16;border-radius:16px;padding:14px}.status{font-weight:900;font-size:18px}.muted{color:var(--muted);font-size:13px;line-height:1.5}.hud,.buttons{display:grid;grid-template-columns:1fr 1fr;gap:10px}.score{background:#0003;border-radius:12px;padding:10px;text-align:center}.score b{display:block;font-size:30px}button{border:0;border-radius:12px;padding:11px 12px;font-weight:900;background:#38bdf8;color:#001827;cursor:pointer}button.secondary{background:#475569;color:#fff}button:disabled{opacity:.45}.log{height:120px;overflow:auto;white-space:pre-wrap;background:#0004;border-radius:10px;padding:9px;color:#dbeafe;font-size:12px}.tip{position:absolute;bottom:16px;left:16px;right:16px;text-align:center;color:#dbeafe;font-size:13px;pointer-events:none}.badge{position:absolute;right:16px;top:16px;background:#0008;border:1px solid #fff2;border-radius:999px;padding:7px 10px;color:#dbeafe;font-size:12px}.dot{display:inline-block;width:13px;height:13px;border-radius:50%;margin-right:6px;vertical-align:-1px}.dot.black{background:#111;border:1px solid #64748b}.dot.white{background:#fff}
</style></head><body><div class="app"><main class="stage" id="stage"><div class="title"><h1>キューブリバーシ 3D</h1><p>空いている場所をドラッグで回転。黄色マスをタップで着手。</p></div><div class="badge" id="zoomLabel">100%</div><div class="scene" id="scene"><div class="cube" id="cube"></div></div><div class="tip">マス上ではドラッグ開始しないよう修正済み</div></main><aside class="side"><section class="card"><div id="status" class="status"></div><div id="hint" class="muted"></div><div class="hud"><div class="score">黒<b id="blackScore">2</b></div><div class="score">白<b id="whiteScore">2</b></div></div></section><section class="card buttons"><button id="passBtn">パス</button><button id="undoBtn" class="secondary">1手戻す</button><button id="resetBtn" class="secondary">リセット</button><button id="legalBtn" class="secondary">合法手表示</button><button id="zoomIn">拡大</button><button id="zoomOut" class="secondary">縮小</button></section><section class="card rules"><div class="muted"><b>仕様</b><br>6面×4×4。上下左右の辺越え有効、斜めの面越え無効。</div></section><section class="card"><div class="muted"><b>棋譜</b></div><div id="log" class="log"></div></section></aside></div><script>
(()=>{'use strict';const N=4,BLACK=1,WHITE=2,faces=['F','R','B','L','U','D'],labels={F:'前 F',R:'右 R',B:'背 B',L:'左 L',U:'上 U',D:'下 D'},O={F:{n:[0,0,1],u:[1,0,0],v:[0,-1,0]},R:{n:[1,0,0],u:[0,0,-1],v:[0,-1,0]},B:{n:[0,0,-1],u:[-1,0,0],v:[0,-1,0]},L:{n:[-1,0,0],u:[0,0,1],v:[0,-1,0]},U:{n:[0,1,0],u:[1,0,0],v:[0,0,1]},D:{n:[0,-1,0],u:[1,0,0],v:[0,0,-1]}};const normalToFace=Object.fromEntries(Object.entries(O).map(([f,o])=>[o.n.join(','),f]));const $=id=>document.getElementById(id),cube=$('cube'),scene=$('scene'),logEl=$('log');let board,turn,history,passStreak,showLegal,gameOver,rx=-24,ry=-34,scale=1,drag=false,lastX=0,lastY=0;const add=(a,b)=>a.map((v,i)=>v+b[i]),mul=(a,k)=>a.map(v=>v*k),dot=(a,b)=>a.reduce((s,v,i)=>s+v*b[i],0),neg=a=>a.map(v=>-v),opp=p=>p===BLACK?WHITE:BLACK,name=p=>p===BLACK?'黒':'白',coord=(f,x,y)=>`${f}-${'ABCD'[x]}${y+1}`;function newBoard(){const b={};for(const f of faces)b[f]=Array.from({length:N},()=>Array(N).fill(0));b.F[1][1]=WHITE;b.F[1][2]=BLACK;b.F[2][1]=BLACK;b.F[2][2]=WHITE;return b}function clone(b){return JSON.parse(JSON.stringify(b))}function crossStep(f,x,y,dx,dy){const nx=x+dx,ny=y+dy;if(nx>=0&&nx<N&&ny>=0&&ny<N)return{f,x:nx,y:ny,dx,dy,ok:true};if(dx&&dy)return{ok:false};const old=O[f],move=add(mul(old.u,dx),mul(old.v,dy)),nf=normalToFace[move.join(',')];if(!nf)return{ok:false};const neu=O[nf],newDir=neg(old.n),ndx=dot(newDir,neu.u),ndy=dot(newDir,neu.v),half=N/2,c=(N-1)/2;let a=x-c,b=y-c;if(dx===1)a=half;if(dx===-1)a=-half;if(dy===1)b=half;if(dy===-1)b=-half;const p=add(add(mul(old.n,half),mul(old.u,a)),mul(old.v,b)),rel=add(p,neg(mul(neu.n,half)));let na=dot(rel,neu.u),nb=dot(rel,neu.v);if(ndx===1)na=-c;if(ndx===-1)na=c;if(ndy===1)nb=-c;if(ndy===-1)nb=c;const rx=Math.round(na+c),ry=Math.round(nb+c);return rx>=0&&rx<N&&ry>=0&&ry<N?{f:nf,x:rx,y:ry,dx:ndx,dy:ndy,ok:true}:{ok:false}}function lineFlips(f,x,y,dx,dy,p){let flips=[],s=crossStep(f,x,y,dx,dy);while(s.ok){const v=board[s.f][s.y][s.x];if(v===opp(p))flips.push({f:s.f,x:s.x,y:s.y});else if(v===p)return flips.length?flips:[];else return[];s=crossStep(s.f,s.x,s.y,s.dx,s.dy)}return[]}function flipsFor(f,x,y,p){if(board[f][y][x])return[];let out=[];for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++)if(dx||dy)out.push(...lineFlips(f,x,y,dx,dy,p));return out}function legalMoves(p){let ms=[];for(const f of faces)for(let y=0;y<N;y++)for(let x=0;x<N;x++){const flips=flipsFor(f,x,y,p);if(flips.length)ms.push({f,x,y,flips})}return ms}function counts(){let black=0,white=0,empty=0;for(const f of faces)for(let y=0;y<N;y++)for(let x=0;x<N;x++){const v=board[f][y][x];if(v===BLACK)black++;else if(v===WHITE)white++;else empty++}return{black,white,empty}}function applyTransform(){scene.style.transform=`rotateX(${rx}deg) rotateY(${ry}deg) scale(${scale})`;$('zoomLabel').textContent=Math.round(scale*100)+'%'}function render(){cube.innerHTML='';const legal=new Set(legalMoves(turn).map(m=>`${m.f},${m.x},${m.y}`));for(const f of faces){const face=document.createElement('section');face.className='face '+f;face.dataset.label=labels[f];for(let y=0;y<N;y++)for(let x=0;x<N;x++){const cell=document.createElement('button');cell.className='cell';cell.title=coord(f,x,y);if(showLegal&&legal.has(`${f},${x},${y}`))cell.classList.add('legal');const v=board[f][y][x];if(v)cell.innerHTML=`<div class="disc ${v===BLACK?'black':'white'}"></div>`;cell.addEventListener('pointerdown',e=>e.stopPropagation());cell.addEventListener('click',e=>{e.stopPropagation();play(f,x,y)});face.appendChild(cell)}cube.appendChild(face)}const c=counts(),lm=legalMoves(turn),winner=c.black===c.white?'引き分け':c.black>c.white?'黒の勝ち':'白の勝ち';$('blackScore').textContent=c.black;$('whiteScore').textContent=c.white;if(gameOver||c.empty===0){gameOver=true;$('status').textContent='ゲーム終了：'+winner;$('hint').textContent=`黒 ${c.black} / 白 ${c.white}`;$('passBtn').disabled=true}else{$('status').innerHTML=`<span class="dot ${turn===BLACK?'black':'white'}"></span>${name(turn)}の番`;$('hint').textContent=lm.length?`合法手は ${lm.length} 手。黄色のマスをタップ。`:'置ける場所がありません。パスしてください。';$('passBtn').disabled=!!lm.length}$('undoBtn').disabled=!history.length;applyTransform()}function play(f,x,y){if(gameOver)return;const flips=flipsFor(f,x,y,turn);if(!flips.length)return;history.push({board:clone(board),turn,passStreak,log:logEl.textContent});board[f][y][x]=turn;for(const q of flips)board[q.f][q.y][q.x]=turn;logEl.textContent=`${name(turn)} ${coord(f,x,y)}：${flips.length}枚反転\n`+logEl.textContent;turn=opp(turn);passStreak=0;if(!legalMoves(turn).length&&!legalMoves(opp(turn)).length)gameOver=true;render()}function pass(){if(gameOver||legalMoves(turn).length)return;history.push({board:clone(board),turn,passStreak,log:logEl.textContent});logEl.textContent=`${name(turn)} パス\n`+logEl.textContent;turn=opp(turn);if(++passStreak>=2)gameOver=true;render()}function undo(){const h=history.pop();if(!h)return;board=h.board;turn=h.turn;passStreak=h.passStreak;logEl.textContent=h.log;gameOver=false;render()}function reset(){board=newBoard();turn=BLACK;history=[];passStreak=0;showLegal=true;gameOver=false;logEl.textContent='';render()}$('stage').addEventListener('pointerdown',e=>{if(e.target.closest('.cell'))return;drag=true;lastX=e.clientX;lastY=e.clientY;$('stage').setPointerCapture(e.pointerId)});$('stage').addEventListener('pointermove',e=>{if(!drag)return;const dx=e.clientX-lastX,dy=e.clientY-lastY;ry+=dx*.45;rx-=dy*.45;rx=Math.max(-89,Math.min(89,rx));lastX=e.clientX;lastY=e.clientY;applyTransform()});$('stage').addEventListener('pointerup',()=>drag=false);$('stage').addEventListener('wheel',e=>{e.preventDefault();scale=Math.max(.55,Math.min(1.8,scale+(e.deltaY<0?.08:-.08)));applyTransform()},{passive:false});$('passBtn').onclick=pass;$('undoBtn').onclick=undo;$('resetBtn').onclick=reset;$('legalBtn').onclick=()=>{showLegal=!showLegal;render()};$('zoomIn').onclick=()=>{scale=Math.min(1.8,scale+.1);applyTransform()};$('zoomOut').onclick=()=>{scale=Math.max(.55,scale-.1);applyTransform()};reset()})();
</script></body></html>
