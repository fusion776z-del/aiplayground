<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Mobile 3D Shooter - 5 Stages</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <canvas id="gameCanvas"></canvas>

    <section id="titleScreen" class="screen active">
      <h1>NEON SKY<br><span>3D SHOOTER</span></h1>
      <p class="lead">スマホ対応・全5ステージ構成のスターター</p>
      <button id="startBtn" class="primary">START</button>
      <button id="stageSelectBtn">STAGE SELECT</button>
      <button id="soundBtn">SOUND: ON</button>
      <p class="hint">左スティック: 移動 / 右ボタン: ショット</p>
    </section>

    <section id="stageScreen" class="screen">
      <h2>STAGE SELECT</h2>
      <div id="stageButtons" class="stage-buttons"></div>
      <button id="backTitleBtn">戻る</button>
    </section>

    <section id="clearScreen" class="screen">
      <h2 id="clearTitle">STAGE CLEAR</h2>
      <p id="clearText"></p>
      <button id="nextStageBtn" class="primary">NEXT</button>
      <button id="clearToTitleBtn">TITLE</button>
    </section>

    <div id="hud" class="hud hidden">
      <div>STAGE <span id="hudStage">1</span></div>
      <div>HP <span id="hudHp">100</span></div>
      <div>SCORE <span id="hudScore">0</span></div>
    </div>

    <div id="touchControls" class="touch hidden">
      <div id="stickBase" class="stick-base"><div id="stickKnob" class="stick-knob"></div></div>
      <button id="fireBtn" class="fire">FIRE</button>
    </div>
  </div>

  <!-- Three.js: ローカル化したい場合は three.min.js をDLして差し替え -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/core.js"></script>
  <script src="js/game1.js"></script>
  <script src="js/game2.js"></script>
  <script src="js/game3.js"></script>
  <script src="js/game4.js"></script>
  <script src="js/game5.js"></script>
  <script>
    window.addEventListener('load', () => {
      window.GameApp.boot();
    });
  </script>
</body>
</html>
